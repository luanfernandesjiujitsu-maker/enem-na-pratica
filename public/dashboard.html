<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<script src="src/js/data.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  :root{
    --pink:#FF2D8B;--purple:#7B2FBE;--yellow:#FFD600;--dark:#1a1a2e;--white:#fff;
  }
  
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease;}
  .reveal.in{opacity:1;transform:translateY(0);}

  /* NAV */
  .navbar{background:var(--purple);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(123,47,190,.3);color:white;}
  .nav-brand{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--yellow);display:flex;align-items:center;gap:8px;}
  .nav-link{padding:7px 14px;border-radius:99px;font-size:13px;font-weight:800;color:rgba(255,255,255,.7);text-decoration:none;transition:.2s;}
  .nav-link:hover{color:#fff;background:rgba(255,255,255,.15);}

  /* HERO */
  .hero{background:linear-gradient(135deg,var(--purple) 0%,#5B21B6 100%);padding:52px 24px 64px;position:relative;overflow:hidden;color:white;}
  .hero-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap;position:relative;z-index:2;}
  .hero h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(30px,5vw,48px);line-height:1.1;margin-bottom:10px;}
  .hero h1 span{color:var(--yellow);}
  .hero-stats{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
  .stat-box{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:12px 18px;min-width:100px;text-align:center;}
  .stat-val{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--yellow);line-height:1;}
  .stat-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.55);text-transform:uppercase;margin-top:3px;}

  /* PROGRESS CARD */
  .progress-card{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);border-radius:18px;padding:20px;min-width:280px;}
  .prog-bar-wrap{height:8px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin:10px 0;}
  .prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--yellow));transition:width 1s ease;}

  /* SIMULADOS GRID */
  .section{padding:64px 24px;max-width:1100px;margin:0 auto;}
  .sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .sim-card{background:white;border:3px solid var(--dark);border-radius:16px;padding:18px 16px;box-shadow:4px 4px 0 var(--dark);transition:.2s;cursor:pointer;text-decoration:none;color:var(--dark);display:flex;flex-direction:column;gap:10px;}
  .sim-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--purple);border-color:var(--purple);}
  .sim-num{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--purple);line-height:1;}
  .sim-mat-tag{font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 10px;border-radius:99px;width:fit-content;}

  /* RANKING */
  .rank-item{background:white;border:2px solid #eee;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:.2s;}
  .rank-item:hover{border-color:var(--purple);transform:translateX(4px);}
  .rank-pos{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--purple);min-width:32px;}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">📝 ENEM na Prática</div>
  <a href="#" class="nav-link" id="btnLogout">Sair</a>
</nav>

<header class="hero">
  <div class="hero-inner">
    <div>
      <div style="font-size:12px;font-weight:800;color:var(--yellow);margin-bottom:14px;text-transform:uppercase;">🔥 BORA ESTUDAR, <span id="userName">ESTUDANTE</span>!</div>
      <h1>Seu progresso no <span>ENEM 2026</span></h1>
      <div class="hero-stats">
        <div class="stat-box"><div class="stat-val">50</div><div class="stat-label">Simulados</div></div>
        <div class="stat-box"><div class="stat-val" id="st-done">0</div><div class="stat-label">Concluídos</div></div>
        <div class="stat-box"><div class="stat-val">5</div><div class="stat-label">Dias seguidos</div></div>
      </div>
    </div>
    <div class="progress-card">
      <div style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;">📊 Progresso Geral</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:0%" id="mainProg"></div></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.7);" id="progTxt">0 de 50 concluintes</div>
    </div>
  </div>
</header>

<section class="section">
  <h2 style="font-family:'Black Han Sans',sans-serif;font-size:32px;margin-bottom:24px;">📝 Seus Simulados</h2>
  <div class="sim-grid" id="simGrid"></div>
</section>

<section class="section">
  <h2 style="font-family:'Black Han Sans',sans-serif;font-size:32px;margin-bottom:24px;">🏆 Ranking dos Alunos</h2>
  <div id="rankList">
    <div class="rank-item"><div class="rank-pos">1</div><div style="font-weight:800">Julia Martins</div><div style="margin-left:auto;font-weight:900">820 pts</div></div>
    <div class="rank-item"><div class="rank-pos">2</div><div style="font-weight:800">Carlos Eduardo</div><div style="margin-left:auto;font-weight:900">785 pts</div></div>
    <div class="rank-item" style="border-color:var(--yellow);background:#FFFBEB;"><div class="rank-pos">3</div><div style="font-weight:800">Você</div><div style="margin-left:auto;font-weight:900">0 pts</div></div>
  </div>
</section>

<script>
  function renderSims(){
    const container = document.getElementById('simGrid');
    container.innerHTML = SIMULADOS.map(sim => `
      <a href="simulado.html?id=${sim.id}" class="sim-card reveal">
        <div class="sim-num">${sim.num}</div>
        <div class="sim-mat-tag" style="background:${sim.mat==='port'?'#FFE4E6':sim.mat==='mat'?'#DBEAFE':'#F3E8FF'}">${sim.matLabel}</div>
        <h4 style="font-weight:800;">${sim.title}</h4>
        <div style="font-size:12px;color:#888;margin-top:auto;">⏱ ${sim.time} · ${sim.qs} questões</div>
      </a>
    `).join('');
    
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  }
  renderSims();
</script>

<script type="module">
  import { checkSession, logout, getProfile } from './src/js/auth.js';

  async function init() {
    const session = await checkSession();
    if (session) {
      try {
        const profile = await getProfile(session.user.id);
        if (profile && profile.full_name) {
          document.getElementById('userName').textContent = profile.full_name.split(' ')[0].toUpperCase();
        }
      } catch (err) {
        console.error("Erro ao carregar perfil:", err);
      }
    }
  }

  document.getElementById('btnLogout').addEventListener('click', async (e) => {
    e.preventDefault();
    if(confirm('Deseja realmente sair?')) {
      await logout();
    }
  });

  init();
</script>
</body>
</html>
