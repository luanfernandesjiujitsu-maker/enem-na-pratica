<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Elite | ENEM na Prática</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-hover: #7C3AED;
            --accent: #FFD600;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #22C55E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }
        
        /* NAVBAR */
        .navbar {
            background: #fff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Black Han Sans', sans-serif; font-size: 1.5rem; color: var(--primary); }
        .user-pill {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.5rem 1rem; border: 1px solid var(--border);
            border-radius: 999px;
        }
        .user-av { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, #7C3AED 0%, #C026D3 100%);
            padding: 3rem 2rem 4rem;
            color: white;
            text-align: center;
        }
        .hero h1 { font-family: 'Black Han Sans', sans-serif; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .hero p { opacity: 0.9; margin-bottom: 2rem; }
        
        .stats-grid {
            display: flex; gap: 1rem; justify-content: center; max-width: 800px; margin: 0 auto;
        }
        .stat-card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 1rem 2rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2);
            min-width: 154px;
        }
        .stat-val { font-family: 'Black Han Sans', sans-serif; font-size: 2rem; display: block; }
        .stat-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; opacity: 0.7; }

        /* TABS - ORGANIZADO POR MATERIAS */
        .tabs-container { margin: -1.5rem auto 2rem; display: flex; justify-content: center; gap: 0.5rem; padding: 0 1rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab {
            background: white; padding: 0.75rem 1.5rem; border-radius: 999px;
            font-weight: 700; font-size: 0.875rem; cursor: pointer;
            border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            white-space: nowrap; transition: 0.2s;
        }
        .tab:hover { transform: translateY(-2px); }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* MAIN CONTENT */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }

        .item-card {
            background: white; border: 1px solid var(--border); border-radius: 1rem;
            padding: 1.5rem; transition: 0.3s; cursor: pointer;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .item-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: var(--primary); }
        
        .tag { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; padding: 0.25rem 0.75rem; border-radius: 999px; width: fit-content; }
        .tag.port { background: #fee2e2; color: #ef4444; }
        .tag.mat { background: #dbeafe; color: #3b82f6; }
        .tag.cn { background: #dcfce7; color: #22c55e; }
        .tag.ch { background: #fef9c3; color: #ca8a04; }
        .tag.red { background: #f3e8ff; color: #8b5cf6; }
        .tag.provao { background: var(--accent); color: #000; }

        .item-title { font-weight: 700; font-size: 1.125rem; line-height: 1.4; color: var(--text-main); }
        .item-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: auto; }
        .item-info { font-size: 0.8125rem; color: var(--text-secondary); font-weight: 600; }

        /* REDAÇÃO / RASCUNHO */
        .essay-section { margin-top: 3rem; background: #fff; border-radius: 1.5rem; border: 1px solid var(--border); padding: 2.5rem; }
        .essay-head { margin-bottom: 2rem; }
        .essay-lines-container { 
            background: #fdfdfd; 
            border: 1px solid #eee; 
            border-radius: 8px; 
            margin-bottom: 1.5rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .line-row { display: flex; border-bottom: 1px solid #f0f0f0; min-height: 40px; }
        .line-num { 
            width: 40px; border-right: 1px solid #f0f0f0; 
            display: flex; align-items: center; justify-content: center; 
            color: #ccc; font-size: 11px; font-weight: 700; background: #fafafa;
            user-select: none;
        }
        .line-input { flex: 1; border: none; outline: none; padding: 10px 15px; font-family: inherit; font-size: 15px; color: #333; resize: none; background: transparent; }

        .btn-send {
            background: var(--primary); color: white; border: none; padding: 1rem 2rem;
            border-radius: 999px; font-weight: 800; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 0.5rem; width: fit-content; margin: 1rem auto 0;
        }
        .btn-send:hover { background: var(--primary-hover); transform: scale(1.05); }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">ENEM na Prática</div>
        <div class="user-pill">
            <span style="font-weight: 700; font-size: 0.875rem;">Luan Fernandes</span>
            <div class="user-av">L</div>
        </div>
    </nav>

    <div class="hero">
        <h1>Bora conquistar seu <span>Vaga!</span></h1>
        <p>A maior plataforma de simulados ENEM do Brasil.</p>
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val" id="totalSims">85</span>
                <span class="stat-label">Simulados</span>
            </div>
            <div class="stat-card">
                <span class="stat-val">IA</span>
                <span class="stat-label">Correção</span>
            </div>
        </div>
    </div>

    <div class="tabs-container" id="tabsBox">
        <!-- Gerado via JS -->
    </div>

    <div class="container">
        <div class="grid" id="mainGrid">
            <!-- Gerado via JS -->
        </div>

        <!-- SEÇÃO DE REDAÇÃO COM RASCUNHO -->
        <div class="essay-section" id="essayArea">
            <div class="essay-head">
                <h2 style="font-family: 'Black Han Sans', sans-serif;">✍️ Folha de Redação e Rascunho</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">Pratique o rascunho e a versão oficial. Seu texto é salvo automaticamente.</p>
            </div>

            <h4 style="margin-bottom: 0.5rem;">✏️ Rascunho Prévio</h4>
            <div class="essay-lines-container" id="rascunhoBox"></div>

            <h4 style="margin-bottom: 0.5rem; margin-top: 2rem;">🖋️ Texto Definitivo</h4>
            <div class="essay-lines-container" id="textoBox"></div>
            
            <button class="btn-send">
                🚀 ENVIAR PARA CORREÇÃO PROFISSIONAL
            </button>
        </div>
    </div>

    <script src="simulados-data.js"></script>
    <script src="src/js/simulados-extra.js"></script>
    <script src="src/js/simulados-extra2.js"></script>
    <script src="src/js/provao-data.js"></script>

    <script>
        let currentTab = 'all';

        function renderTabs() {
            const categories = [
                { id: 'all', label: 'Todos', icon: '🌟' },
                { id: 'red', label: 'Redação', icon: '✍️' },
                { id: 'port', label: 'Linguagens', icon: '📚' },
                { id: 'mat', label: 'Matemática', icon: '🔢' },
                { id: 'ch', label: 'Humanas', icon: '🌎' },
                { id: 'cn', label: 'Natureza', icon: '🧬' },
                { id: 'provao', label: 'Provões', icon: '🏆' }
            ];

            const tabsBox = document.getElementById('tabsBox');
            tabsBox.innerHTML = categories.map(cat => `
                <div class="tab ${currentTab === cat.id ? 'active' : ''}" onclick="setTab('${cat.id}')">
                    ${cat.icon} ${cat.label}
                </div>
            `).join('');
        }

        function setTab(id) {
            currentTab = id;
            renderTabs();
            renderSims();
        }

        function renderSims() {
            let allSims = [];
            // Acesso robusto ao array global de simulados
            if (typeof SIMULADOS !== 'undefined') allSims = SIMULADOS;
            else if (window.SIMULADOS) allSims = window.SIMULADOS;

            document.getElementById('totalSims').textContent = allSims.length;

            const filtered = allSims.filter(s => currentTab === 'all' || s.mat === currentTab);
            const grid = document.getElementById('mainGrid');

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 4rem; opacity: 0.5;">Carregando simulados...</p>';
                // Se estiver vazio, tenta novamente em 500ms (aguardando scripts lentos)
                setTimeout(renderSims, 500);
                return;
            }

            grid.innerHTML = filtered.map(s => `
                <div class="item-card" onclick="window.location.href='simulado.html?id=${s.id}'">
                    <span class="tag ${s.mat}">${s.matLabel || 'ENEM'}</span>
                    <h3 class="item-title">${s.title}</h3>
                    <div class="item-footer">
                        <span class="item-info">⏱ ${s.time} · ${s.qs} Qs</span>
                        <span style="font-size: 0.7rem; font-weight: 800; color: var(--primary);">MODO ELITE ✓</span>
                    </div>
                </div>
            `).join('');
        }

        function buildEssayLines() {
            const rascBox = document.getElementById('rascunhoBox');
            const textoBox = document.getElementById('textoBox');
            
            let rascHtml = '', textoHtml = '';
            for(let i=1; i<=15; i++) {
                rascHtml += `<div class="line-row"><div class="line-num">${i}</div><textarea class="line-input" rows="1" placeholder="${i===1?'Esboce aqui...':''}"></textarea></div>`;
            }
            for(let i=1; i<=30; i++) {
                textoHtml += `<div class="line-row"><div class="line-num">${i}</div><textarea class="line-input" rows="1" placeholder="${i===1?'Texto oficial...':''}"></textarea></div>`;
            }
            rascBox.innerHTML = rascHtml;
            textoBox.innerHTML = textoHtml;
        }

        window.onload = () => {
            renderTabs();
            renderSims();
            buildEssayLines();
        };

        // Scroll reveal animation basic
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.item-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                if(rect.top < window.innerHeight - 50) card.style.opacity = '1';
            });
        });
    </script>
</body>
</html>
