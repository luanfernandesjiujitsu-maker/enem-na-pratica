<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
/* CSS MODERNO E ORGANIZADO (VERSÃO PREMIUM) */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
img{display:block;max-width:100%;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#F8F0FF;}
::-webkit-scrollbar-thumb{background:#A855F7;border-radius:99px;}

:root{
  --pink:#FF2D8B;--pink2:#FF6BB5;
  --purple:#7B2FBE;--purple2:#A855F7;
  --yellow:#FFD600;--yellow2:#FFE44D;
  --dark:#1a1a2e;--dark2:#16213e;
  --bg:#F8F0FF;--bg2:#fff;--bg3:#F3E8FF;
  --white:#fff;--gray:#888;--gray2:#555;
  --green:#16A34A;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

/* NAV */
.navbar{
  background:var(--purple);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(123,47,190,.3);
}
.nav-brand{
  font-family:'Black Han Sans',sans-serif;
  font-size:20px;letter-spacing:1px;color:var(--yellow);
  display:flex;align-items:center;gap:8px;
}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:99px;
  font-size:13px;font-weight:800;color:rgba(255,255,255,.7);
  transition:.2s;
}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-uname{font-size:13px;font-weight:800;color:#fff;}
.nav-urole{font-size:11px;color:rgba(255,255,255,.6);font-weight:600;}
.nav-av{
  width:38px;height:38px;border-radius:50%;
  border:2px solid var(--yellow);object-fit:cover;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,var(--purple) 0%,#5B21B6 100%);
  padding:52px 24px 64px;position:relative;overflow:hidden;
}
.hero-inner{
  max-width:1100px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:40px;flex-wrap:wrap;position:relative;z-index:2;
}
.hero h1{
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(30px,5vw,48px);
  color:#fff;line-height:1.1;margin-bottom:10px;letter-spacing:.5px;
}
.hero h1 span{color:var(--yellow);}
.hero-sub{font-size:15px;color:rgba(255,255,255,.75);font-weight:600;margin-bottom:24px;max-width:420px;line-height:1.65;}

.hero-stats{display:flex;flex-wrap:wrap;gap:12px;}
.stat-box{
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);
  border-radius:14px;padding:12px 18px;min-width:100px;text-align:center;
}
.stat-val{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--yellow);line-height:1;}
.stat-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}

/* TABS (MATÉRIAS ORGANIZADAS) */
.tabs-container {
  max-width: 1100px; margin: -30px auto 30px; padding: 0 24px; position: relative; z-index: 10;
}
.tabs-wrapper {
  display: flex; gap: 12px; overflow-x: auto; padding: 12px;
  background: #fff; border: 3px solid var(--dark); border-radius: 99px;
  box-shadow: 6px 6px 0 var(--dark);
  scrollbar-width: none;
}
.tabs-wrapper::-webkit-scrollbar { display: none; }
.tab-item {
  padding: 10px 24px; border-radius: 99px; font-weight: 800; font-size: 14px;
  cursor: pointer; white-space: nowrap; transition: .2s; border: 2px solid transparent;
  display: flex; align-items: center; gap: 8px; color: var(--dark);
}
.tab-item:hover { background: var(--bg3); }
.tab-item.active { background: var(--purple); color: #fff; border-color: var(--dark); }

/* SECTIONS */
.section{padding:40px 24px;}
.container{max-width:1100px;margin:0 auto;}
.sec-head{margin-bottom:24px;}
.sec-tag{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--purple);margin-bottom:6px;}
.sec-title{font-family:'Black Han Sans',sans-serif;font-size:32px;color:var(--dark);}

/* SIMULADOS GRID */
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
.sim-card{
  background:var(--bg2);border:3px solid var(--dark);
  border-radius:20px;padding:24px;
  box-shadow:6px 6px 0 var(--dark);
  transition:.2s;cursor:pointer;
  display:flex;flex-direction:column;gap:14px;
  animation: fadeUp .5s ease both;
}
.sim-card:hover{transform:translate(-3px,-3px);box-shadow:10px 10px 0 var(--purple);border-color:var(--purple);}
.sim-card-header{display:flex;justify-content:space-between;align-items:flex-start;}
.sim-num{font-family:'Black Han Sans',sans-serif;font-size:36px;color:var(--purple);line-height:1;}
.sim-mat-tag{font-size:11px;font-weight:900;text-transform:uppercase;padding:5px 12px;border-radius:99px;width:fit-content;border:2px solid var(--dark);}
.mat-port{background:#FFE4E6;color:#BE123C;}
.mat-mat{background:#DBEAFE;color:#1D4ED8;}
.mat-cn{background:#DCFCE7;color:#15803D;}
.mat-ch{background:#FEF3C7;color:#B45309;}
.mat-red{background:#F3E8FF;color:#7C3AED;}
.mat-provao{background:var(--yellow);color:var(--dark);}

.sim-card h4{font-size:16px;font-weight:800;color:var(--dark);line-height:1.4;margin-top:4px;}
.sim-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:12px;border-top:2px dashed #eee;}
.sim-qs{font-size:12px;font-weight:700;color:var(--gray2);}

/* RANKING SIMPLIFICADO NO SITE */
.ranking-section { background: #fff; border-top: 4px solid var(--purple); }

@media(max-width:768px){ .sim-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">📝 ENEM na Prática</div>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link active">🏠 Dashboard</a>
    <a href="index.html" class="nav-link">👋 Sair</a>
  </div>
  <div class="nav-right">
    <div style="text-align:right">
      <div class="nav-uname">Luan Fernandes</div>
      <div class="nav-urole">Plano Premium ✨</div>
    </div>
    <img src="https://i.pravatar.cc/150?img=11" class="nav-av"/>
  </div>
</nav>

<header class="hero">
  <div class="hero-inner">
    <div>
      <h1>Potencialize seus <span>Estudos!</span></h1>
      <p class="hero-sub">Matérias organizadas e simulados com correção por Inteligência Artificial.</p>
      <div class="hero-stats">
        <div class="stat-box"><div class="stat-val" id="st-total">85</div><div class="stat-label">Simulados</div></div>
        <div class="stat-box"><div class="stat-val">TRI</div><div class="stat-label">Correção IA</div></div>
      </div>
    </div>
  </div>
</header>

<div class="tabs-container">
  <div class="tabs-wrapper" id="tabsBox"></div>
</div>

<section class="section" id="simulados">
  <div class="container">
    <div class="sim-grid" id="simGrid"></div>
  </div>
</section>

<script src="simulados-data.js"></script>
<script src="src/js/simulados-extra.js"></script>
<script src="src/js/simulados-extra2.js"></script>
<script src="src/js/provao-data.js"></script>

<script>
var activeTab = 'all';

function renderTabs(){
  const categories = [
    { key: 'all', label: 'Todos', icon: '🌟' },
    { key: 'red', label: 'Redação', icon: '✍️' },
    { key: 'port', label: 'Linguagens', icon: '📚' },
    { key: 'mat', label: 'Matemática', icon: '🔢' },
    { key: 'provao', label: 'Provões', icon: '🏆' }
  ];
  document.getElementById('tabsBox').innerHTML = categories.map(cat => `
    <div class="tab-item ${activeTab === cat.key ? 'active' : ''}" onclick="setTab('${cat.key}')">
      <span>${cat.icon}</span> ${cat.label}
    </div>`).join('');
}

function setTab(key){ activeTab = key; renderTabs(); renderSims(); }

function renderSims(){
  let all = [];
  // Usa o array global SIMULADOS que foi populado pelos scripts
  if (typeof SIMULADOS !== 'undefined') all = SIMULADOS;
  else if (window.SIMULADOS) all = window.SIMULADOS;

  const filtered = all.filter(s => activeTab === 'all' || s.mat === activeTab);
  const grid = document.getElementById('simGrid');
  
  if(filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;color:#aaa;font-weight:800;">Nenhum simulado encontrado nesta categoria.</div>';
    return;
  }

  grid.innerHTML = filtered.map(s => `
    <div class="sim-card" onclick="window.location.href='simulado.html?id=${s.id}'">
      <div class="sim-card-header">
        <div class="sim-num">${s.num}</div>
        <span class="sim-mat-tag mat-${s.mat}">${s.matLabel || 'Simulado'}</span>
      </div>
      <h4>${s.title}</h4>
      <div class="sim-card-footer">
        <span class="sim-qs">⏱ ${s.time} · ${s.qs} questões</span>
        <span style="font-size:10px;font-weight:900;color:var(--green);">✓ CORREÇÃO IA PRONTA</span>
      </div>
    </div>`).join('');
    
  document.getElementById('st-total').textContent = all.length;
}

window.onload = function() {
  renderTabs();
  renderSims();
};
</script>
</body>
</html>
