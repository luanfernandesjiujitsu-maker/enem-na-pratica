<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard | ENEM na Prática</title>
<meta name="description" content="Acesse seus simulados, acompanhe seu progresso e conquiste sua vaga no ENEM 2026.">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
  :root{
    --pink:#FF2D8B;--purple:#7B2FBE;--yellow:#FFD600;
    --dark:#1a1a2e;--bg:#F8F0FF;--white:#fff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);overflow-x:hidden;}

  /* NAVBAR */
  .navbar{background:var(--purple);padding:0 24px;height:70px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 0 var(--dark);}
  .nav-brand{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--yellow);text-decoration:none;display:flex;align-items:center;gap:10px;}
  .btn-sair{background:rgba(255,45,139,0.2);color:var(--pink);padding:10px 20px;border-radius:99px;font-weight:900;text-decoration:none;border:2px solid var(--pink);transition:0.2s;}
  .btn-sair:hover{background:var(--pink);color:white;}

  /* HERO AREA */
  .hero{background:linear-gradient(135deg, var(--purple), #5B21B6);padding:60px 24px;color:white;border-bottom:6px solid var(--dark);}
  .hero-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap;}
  .hero h1{font-family:'Black Han Sans',sans-serif;font-size:3rem;line-height:1;margin-bottom:15px;}
  .hero h1 span{color:var(--yellow);}
  
  .stats-row{display:flex;gap:15px;flex-wrap:wrap;}
  .stat-card{background:rgba(255,255,255,0.1);padding:15px 25px;border-radius:20px;border:2px solid rgba(255,255,255,0.2);min-width:140px;text-align:center;}
  .stat-num{font-family:'Black Han Sans',sans-serif;font-size:2rem;color:var(--yellow);display:block;}
  .stat-label{font-size:0.8rem;font-weight:800;text-transform:uppercase;opacity:0.7;}

  /* MAIN CONTENT */
  .container{max-width:1100px;margin:40px auto;padding:0 24px;}
  .sec-title{font-family:'Black Han Sans',sans-serif;font-size:2rem;margin-bottom:30px;display:flex;align-items:center;gap:12px;}

  /* TABS */
  .tabs{display:flex;gap:10px;margin-bottom:30px;overflow-x:auto;padding-bottom:10px;}
  .tab-btn{background:var(--white);border:3px solid var(--dark);padding:12px 24px;border-radius:99px;font-weight:900;cursor:pointer;white-space:nowrap;transition:0.2s;}
  .tab-btn.active{background:var(--yellow);box-shadow:4px 4px 0 var(--dark);transform:translateY(-2px);}

  /* SIMULADOS GRID */
  .sim-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:25px;}
  .sim-card{background:var(--white);border:4px solid var(--dark);border-radius:24px;padding:24px;text-decoration:none;color:inherit;box-shadow:6px 6px 0 var(--dark);transition:0.3s;position:relative;overflow:hidden;}
  .sim-card:hover{transform:translateY(-8px) rotate(1deg);box-shadow:12px 12px 0 var(--purple);border-color:var(--purple);}
  .sim-tag{background:var(--bg);padding:4px 12px;border-radius:99px;font-size:0.7rem;font-weight:900;text-transform:uppercase;margin-bottom:12px;display:inline-block;border:2px solid var(--dark);}
  .sim-card h4{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;margin-bottom:10px;color:var(--dark);}
  .sim-meta{font-size:0.9rem;font-weight:700;color:#666;display:flex;align-items:center;gap:10px;}
  
  /* FOOTER */
  .site-footer{background:var(--dark);color:white;padding:40px;text-align:center;margin-top:80px;border-top:6px solid var(--purple);}
</style>
</head>
<body>

<nav class="navbar">
  <a href="dashboard.html" class="nav-brand">📝 ENEM na Prática</a>
  <a href="index.html" class="btn-sair">👋 SAIR</a>
</nav>

<header class="hero">
  <div class="hero-inner">
    <div>
      <h1>Bom te ver,<br/><span>Estudante!</span> 👋</h1>
      <div class="stats-row">
        <div class="stat-card"><span class="stat-num">0</span><span class="stat-label">Feitos</span></div>
        <div class="stat-card"><span class="stat-num">0</span><span class="stat-label">Nota Média</span></div>
        <div class="stat-card"><span class="stat-num">80+</span><span class="stat-label">Simulados</span></div>
      </div>
    </div>
    <div style="text-align:center;">
       <button onclick="window.location.href='simulado.html?id=1'" style="background:var(--yellow);color:var(--dark);padding:20px 40px;border-radius:99px;font-family:'Black Han Sans',sans-serif;font-size:1.5rem;border:4px solid var(--dark);box-shadow:6px 6px 0 var(--dark);cursor:pointer;">CONTINUAR ESTUDOS →</button>
    </div>
  </div>
</header>

<main class="container">
  <h2 class="sec-title">🎯 Seus Simulados</h2>
  
  <div class="tabs">
    <button class="tab-btn active">🌟 TODOS</button>
    <button class="tab-btn">📚 LINGUAGENS</button>
    <button class="tab-btn">🌍 HUMANAS</button>
    <button class="tab-btn">🧬 NATUREZA</button>
    <button class="tab-btn">🔢 MATEMÁTICA</button>
    <button class="tab-btn">🔥 PROVÕES</button>
  </div>

  <div class="sim-grid" id="simGrid">
    <!-- Renderizado por JS -->
  </div>
</main>

<footer class="site-footer">
  <p>© 2026 ENEM na Prática · Focado na sua aprovação.</p>
</footer>

<script src="src/js/data.js?v=99"></script>
<script src="src/js/simulados-extra.js?v=99"></script>
<script src="src/js/provao-data.js?v=99"></script>
<script>
  const simulados = window.SIMULADOS || [];
  function render(filter = 'all'){
    const grid = document.getElementById('simGrid');
    const items = filter === 'all' ? simulados : simulados.filter(s => s.mat === filter);
    
    grid.innerHTML = items.map((s, idx) => `
      <a href="simulado.html?id=${s.id}" class="sim-card">
        <span class="sim-tag">${s.matLabel}</span>
        <h4>${s.title}</h4>
        <div class="sim-meta">
          <span>⏱ ${s.time}</span>
          <span>📋 ${s.qs} questões</span>
        </div>
      </a>
    `).join('');
  }
  window.onload = () => render();
</script>
</body>
</html>
