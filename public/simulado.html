<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Simulado | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
/* CSS PREMIUM - SIMULADO COM CORREÇÃO IA */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;-webkit-font-smoothing:antialiased;}
.navbar{background:var(--purple);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(123,47,190,.3);color:#fff;}
.nav-back{background:rgba(255,255,255,.2);color:#fff;padding:8px 16px;border-radius:99px;font-weight:800;text-decoration:none;font-size:13px;transition:.2s;}
.nav-back:hover{background:rgba(255,255,255,.3);}
.nav-timer{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--yellow);}

:root{
  --pink:#FF2D8B; --purple:#7B2FBE; --yellow:#FFD600; --dark:#1a1a2e;
}

.main{max-width:900px;margin:20px auto;padding:0 20px;}
.q-card{background:#fff;border:3px solid var(--dark);border-radius:24px;padding:32px;box-shadow:6px 6px 0 var(--dark);margin-bottom:20px;}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #eee;}
.q-num{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--purple);}
.q-mat{font-size:11px;font-weight:900;text-transform:uppercase;padding:4px 12px;border-radius:99px;border:2px solid var(--dark);}
.q-enunciado{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:25px;}

.alts{display:flex;flex-direction:column;gap:10px;}
.alt-btn{display:flex;align-items:center;gap:15px;padding:16px;border:3px solid var(--dark);border-radius:15px;background:#fff;cursor:pointer;transition:.2s;text-align:left;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;}
.alt-btn:hover{background:var(--bg3);border-color:var(--purple);}
.alt-btn.selected{background:var(--purple);color:#fff;border-color:var(--dark);}
.alt-letter{width:32px;height:32px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;}

/* DISCURSIVA / REDAÇÃO */
.discursive-area{display:flex;flex-direction:column;gap:15px;}
.discursive-input{width:100%;min-height:200px;padding:20px;border:3px solid var(--dark);border-radius:20px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:600;outline:none;resize:vertical;}
.btn-ai{background:linear-gradient(135deg,#7B2FBE,#FF2D8B);color:#fff;border:3px solid var(--dark);padding:15px;border-radius:99px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:4px 4px 0 var(--dark);transition:.2s;}
.btn-ai:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--dark);}

.q-nav{display:flex;justify-content:space-between;margin-top:20px;}
.btn-nav{background:var(--dark);color:#fff;border:none;padding:12px 25px;border-radius:99px;font-weight:800;cursor:pointer;transition:.2s;}
.btn-nav:hover{opacity:.9;}

/* AI MODAL */
.ai-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:20px;}
.ai-modal.open{display:flex;}
.ai-box{background:#fff;border:4px solid var(--dark);border-radius:24px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;padding:32px;position:relative;}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:15px;}
.ai-avatar{width:50px;height:50px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--dark);}
.ai-title{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--dark);}

@keyframes typing{from{width:0}to{width:100%}}
.typing-line{overflow:hidden;border-right:3px solid var(--purple);white-space:nowrap;animation:typing 2s steps(40, end), blink-caret .75s step-end infinite;}

.start-screen{text-align:center;padding:100px 0;}
.start-icon{font-size:64px;margin-bottom:20px;}
.start-title{font-family:'Black Han Sans',sans-serif;font-size:32px;margin-bottom:10px;}
</style>
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:15px">
    <a href="dashboard.html" class="nav-back">← Sair</a>
    <div style="font-family:'Black Han Sans',sans-serif;font-size:18px;">SIMULADO ENEM</div>
  </div>
  <div class="nav-timer" id="timerDisplay">00:00</div>
</nav>

<div class="main">
  <div id="startScreen" class="start-screen">
    <div class="start-icon">✨</div>
    <h1 class="start-title" id="startTitle">Carregando...</h1>
    <div id="startInfo" style="margin-bottom:30px;font-weight:700;color:#666;"></div>
    <button class="btn-ai" style="padding:15px 40px;" onclick="iniciar()">COMEÇAR AGORA</button>
  </div>

  <div id="simScreen" style="display:none">
    <div id="questionArea"></div>
    <div class="q-nav">
      <button class="btn-nav" onclick="prev()">← Anterior</button>
      <button class="btn-nav" id="btnNext" onclick="next()">Próximo →</button>
    </div>
  </div>
</div>

<!-- MODAL IA -->
<div class="ai-modal" id="aiModal">
  <div class="ai-box">
    <div class="ai-header">
      <div class="ai-avatar">👨‍🏫</div>
      <div class="ai-title">Professor Alberto (IA)</div>
    </div>
    <div id="aiResponse" style="font-size:16px;line-height:1.6;font-weight:600;color:#444;"></div>
    <button class="btn-nav" style="width:100%;margin-top:20px;" onclick="closeAI()">Entendido, Professor!</button>
  </div>
</div>

<script src="simulados-data.js"></script>
<script src="src/js/simulados-extra.js"></script>
<script src="src/js/simulados-extra2.js"></script>
<script src="src/js/provao-data.js"></script>

<script>
var sim = null;
var currentQ = 0;
var respostas = {};
var elapsed = 0;
var timer = null;

function load(){
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  
  let all = [];
  if (typeof SIMULADOS !== 'undefined') all = SIMULADOS;
  else if (window.SIMULADOS) all = window.SIMULADOS;

  sim = all.find(x => x.id === id);
  if(!sim){
    document.getElementById('startTitle').textContent = "Simulado não encontrado";
    return;
  }
  document.getElementById('startTitle').textContent = sim.title;
  document.getElementById('startInfo').textContent = `${sim.qs} questões · Estilo ENEM 2026`;
}

function iniciar(){
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('simScreen').style.display = 'block';
  render();
  timer = setInterval(() => {
    elapsed++;
    const m = Math.floor(elapsed/60);
    const s = elapsed%60;
    document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function render(){
  const q = sim.questoes[currentQ];
  const qArea = document.getElementById('questionArea');
  
  let html = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Questão ${currentQ + 1}</div>
        <div class="q-mat" style="background:${getMatColor(sim.mat)}">${sim.matLabel || 'Geral'}</div>
      </div>
      <div class="q-enunciado">${q.enunciado}</div>`;

  if(q.alternativas){
    html += `<div class="alts">` + q.alternativas.map((alt, i) => {
      const letter = ['A','B','C','D','E'][i];
      const isSel = respostas[currentQ] === letter;
      return `<button class="alt-btn ${isSel?'selected':''}" onclick="responder('${letter}')">
        <div class="alt-letter">${letter}</div>
        <div>${alt}</div>
      </button>`;
    }).join('') + `</div>`;
  } else {
    // DISCURSIVA / REDAÇÃO
    html += `
      <div class="discursive-area">
        <textarea class="discursive-input" id="discInp" placeholder="Escreva sua resposta ou redação aqui..." oninput="salvarDisc(this.value)">${respostas[currentQ] || ''}</textarea>
        <button class="btn-ai" onclick="corrigirIA()">
          <span>🤖</span> CORRIGIR COM INTELIGÊNCIA ARTIFICIAL
        </button>
      </div>`;
  }

  html += `</div>`;
  qArea.innerHTML = html;
  
  const btnNext = document.getElementById('btnNext');
  if(currentQ === sim.questoes.length - 1) btnNext.textContent = 'FINALIZAR';
  else btnNext.textContent = 'Próximo →';
}

function getMatColor(m){
  const colors = {port:'#BE123C', mat:'#1D4ED8', cn:'#15803D', ch:'#B45309', red:'#7C3AED', provao:'#F59E0B'};
  return colors[m] || '#1a1a2e';
}

function responder(letter){ respostas[currentQ] = letter; render(); }
function salvarDisc(val){ respostas[currentQ] = val; }

function prev(){ if(currentQ > 0){ currentQ--; render(); } }
function next(){
  if(currentQ < sim.questoes.length - 1){ currentQ++; render(); }
  else {
    alert('Simulado finalizado com sucesso! Seu progresso foi salvo.');
    window.location.href = 'dashboard.html';
  }
}

async function corrigirIA(){
  const texto = document.getElementById('discInp').value;
  if(texto.length < 50){ alert('Escreva pelo menos 50 caracteres para uma correção de IA precisa.'); return; }
  
  const respArea = document.getElementById('aiResponse');
  respArea.innerHTML = '<i>Professor Alberto está analisando sua resposta...</i>';
  document.getElementById('aiModal').classList.add('open');

  try {
    const response = await fetch('/api/ai-correction', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        enunciado: sim.questoes[currentQ].enunciado,
        resposta: texto,
        materia: sim.matLabel
      })
    });
    const data = await response.json();
    respArea.innerHTML = data.correction.replace(/\n/g, '<br>');
  } catch (err) {
    respArea.innerHTML = "<b>Erro na conexão com o Professor Alberto.</b> No momento, a IA de correção só funciona no ambiente online do site. Se você estiver vendo isso localmente, a correção aparecerá após o deploy.";
  }
}

function closeAI(){ document.getElementById('aiModal').classList.remove('open'); }

window.onload = load;
</script>
</body>
</html>
