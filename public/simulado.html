<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Simulado | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<script src="src/js/data.js"></script>
<script src="src/js/simulados-extra.js"></script>
<script src="src/js/simulados-extra2.js"></script>
<script src="src/js/provao-data.js"></script>
<script src="src/js/direto-adm.js"></script>
<script src="src/js/direto-adm-discursiva.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;min-height:100vh;-webkit-font-smoothing:antialiased;}
:root{--pink:#FF2D8B;--purple:#7B2FBE;--yellow:#FFD600;--dark:#1a1a2e;--green:#16A34A;--red:#DC2626;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,47,190,.4)}70%{box-shadow:0 0 0 10px rgba(123,47,190,0)}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* NAV */
.navbar{background:var(--purple);padding:0 24px;height:65px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 20px rgba(0,0,0,.3);border-bottom:2px solid rgba(255,214,0,.3);}
.nav-brand{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--yellow);display:flex;align-items:center;gap:10px;}
.nav-back{display:flex;align-items:center;gap:6px;color:#fff;background:rgba(255,255,255,.15);padding:8px 16px;border-radius:99px;font-size:13px;font-weight:800;cursor:pointer;transition:.2s;text-decoration:none;}
.nav-back:hover{background:rgba(255,255,255,.25);transform:translateX(-3px);}
.nav-timer{background:var(--dark);border:2px solid var(--yellow);border-radius:99px;padding:6px 20px;font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--yellow);letter-spacing:.05em;box-shadow:0 0 15px rgba(255,214,0,.2);}
.nav-timer.warning{color:#FC8181;border-color:#FC8181;}


/* PROGRESS BAR */
.progress-bar-top{height:4px;background:rgba(255,255,255,.15);position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--pink));transition:width .4s ease;}

/* MAIN */
.main{max-width:760px;margin:0 auto;padding:32px 24px 80px;}

/* QUESTION CARD */
.q-card{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:32px 28px;box-shadow:5px 5px 0 var(--dark);animation:fadeUp .4s ease both;margin-bottom:24px;}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.q-num{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--purple);line-height:1;}
.q-mat{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:99px;}
.mat-port{background:#FFE4E6;color:#BE123C;}
.mat-mat{background:#DBEAFE;color:#1D4ED8;}
.mat-cn{background:#DCFCE7;color:#15803D;}
.mat-ch{background:#FEF3C7;color:#B45309;}
.mat-red{background:#F3E8FF;color:#7C3AED;}
.mat-direito{background:#F3F4F6;color:#4B5563;border:1px solid #D1D5DB;}
.q-enunciado{font-size:16px;font-weight:600;color:var(--dark);line-height:1.75;white-space:pre-wrap;margin-bottom:24px;}

/* ALTERNATIVES */
.alts{display:flex;flex-direction:column;gap:10px;}
.alt-btn{
  display:flex;align-items:flex-start;gap:14px;
  background:#F8F0FF;border:2px solid #DDD6FE;
  border-radius:14px;padding:14px 18px;
  cursor:pointer;text-align:left;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--dark);
  transition:.2s;width:100%;
}
.alt-btn:hover{border-color:var(--purple);background:#EDE9FE;transform:translateX(4px);}
.alt-btn.selected{border-color:var(--purple);background:#EDE9FE;box-shadow:3px 3px 0 var(--purple);}
.alt-btn.correct{border-color:var(--green);background:#DCFCE7;box-shadow:3px 3px 0 var(--green);color:var(--green);}
.alt-btn.wrong{border-color:var(--red);background:#FEE2E2;box-shadow:3px 3px 0 var(--red);color:var(--red);animation:shake .3s ease;}
.alt-btn.show-correct{border-color:var(--green);background:#DCFCE7;}
.alt-letter{width:26px;height:26px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;margin-top:1px;}
.alt-btn.correct .alt-letter{background:var(--green);}
.alt-btn.wrong .alt-letter{background:var(--red);}
.alt-btn.show-correct .alt-letter{background:var(--green);}

/* EXPLICACAO */
.explicacao-box{
  background:#F0FDF4;border:2px solid #86EFAC;border-radius:14px;
  padding:18px 20px;margin-top:16px;
  font-size:14px;font-weight:600;color:#15803D;line-height:1.7;
  display:none;animation:fadeUp .3s ease both;white-space:pre-wrap;
}
.explicacao-box.show{display:block;}
.exp-title{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--green);margin-bottom:8px;}

/* NAV BUTTONS */
.q-nav{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.btn-prev,.btn-next,.btn-finish{
  display:flex;align-items:center;gap:8px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;
  padding:13px 26px;border-radius:99px;border:3px solid var(--dark);
  cursor:pointer;transition:.2s;box-shadow:4px 4px 0 var(--dark);
}
.btn-prev{background:#fff;color:var(--dark);}
.btn-prev:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--dark);}
.btn-next{background:var(--purple);color:#fff;}
.btn-next:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--dark);}
.btn-finish{background:var(--yellow);color:var(--dark);}
.btn-finish:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--dark);}

/* Q MAP */
.q-map{background:#fff;border:2px solid #DDD6FE;border-radius:16px;padding:16px;margin-bottom:24px;}
.q-map-title{font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:12px;}
.q-map-dots{display:flex;flex-wrap:wrap;gap:8px;}
.q-dot{
  width:34px;height:34px;border-radius:50%;
  border:2px solid #DDD6FE;
  background:#fff;color:var(--dark);
  font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;
}
.q-dot:hover{border-color:var(--purple);}
.q-dot.answered{background:var(--purple);color:#fff;border-color:var(--purple);}
.q-dot.current{border:2px solid var(--dark);box-shadow:2px 2px 0 var(--dark);}
.q-dot.correct-dot{background:var(--green);border-color:var(--green);color:#fff;}
.q-dot.wrong-dot{background:var(--red);border-color:var(--red);color:#fff;}

/* RESULTADO */
.result-screen{display:none;animation:fadeUp .5s ease both;text-align:center;}
.result-screen.show{display:block;}
.result-icon{font-size:80px;margin-bottom:16px;animation:pop .5s ease both;}
.result-title{font-family:'Black Han Sans',sans-serif;font-size:40px;color:var(--dark);margin-bottom:8px;}
.result-score-box{
  background:var(--purple);border:4px solid var(--dark);
  border-radius:24px;padding:36px;
  max-width:420px;margin:24px auto;
  box-shadow:8px 8px 0 var(--dark);
}
.result-pct{font-family:'Black Han Sans',sans-serif;font-size:80px;color:var(--yellow);line-height:1;text-shadow:4px 4px 0 rgba(0,0,0,.2);}
.result-label{font-size:16px;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:16px;}
.result-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
.rstat{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);border-radius:12px;padding:12px 16px;min-width:100px;}
.rstat-val{font-family:'Black Han Sans',sans-serif;font-size:26px;line-height:1;}
.rstat-val.green{color:#6EE7B7;}.rstat-val.red{color:#FC8181;}.rstat-val.yellow{color:var(--yellow);}
.rstat-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;}
.result-msg{font-size:16px;font-weight:700;color:#555;max-width:440px;margin:16px auto;line-height:1.7;}

/* Review section */
.review-title{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--dark);margin:32px 0 16px;}
.review-item{background:#fff;border:2px solid #DDD6FE;border-radius:16px;padding:20px;margin-bottom:14px;text-align:left;}
.ri-q{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:10px;line-height:1.6;}
.ri-ans{display:flex;gap:10px;align-items:center;font-size:13px;font-weight:700;margin-bottom:6px;}
.ri-correct{color:var(--green);}
.ri-wrong{color:var(--red);}
.ri-exp{font-size:13px;color:#555;font-weight:600;line-height:1.65;background:#F0FDF4;border-radius:10px;padding:10px 14px;margin-top:8px;white-space:pre-wrap;}

.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--yellow);color:var(--dark);font-size:16px;font-weight:900;padding:14px 32px;border-radius:99px;border:3px solid var(--dark);cursor:pointer;box-shadow:5px 5px 0 var(--dark);transition:.2s;margin:8px;}
.btn-retry:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--dark);}
.btn-back-dash{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--dark);font-size:16px;font-weight:900;padding:14px 32px;border-radius:99px;border:3px solid var(--dark);cursor:pointer;box-shadow:5px 5px 0 var(--dark);transition:.2s;margin:8px;}
.btn-back-dash:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--dark);}

/* PROFESSIONAL GABARITO GRID */
.gabarito-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:8px;margin:24px 0;padding:20px;background:#f9f5ff;border-radius:20px;border:2px dashed #DDD6FE;}
.g-cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;font-size:14px;color:#fff;cursor:default;transition:.2s;}
.g-cell.c{background:var(--green);box-shadow:0 3px 0 #15803D;}
.g-cell.w{background:var(--red);box-shadow:0 3px 0 #991B1B;}
.g-cell:hover{transform:scale(1.1);}

/* PROVAO ESSAY SECTION */
.provao-essay-box{background:linear-gradient(135deg, #7B2FBE, #FF2D8B);color:#fff;padding:30px;border-radius:24px;margin-top:40px;text-align:center;box-shadow:0 10px 30px rgba(123,47,190,0.3);position:relative;overflow:hidden;}
.provao-essay-title{font-family:'Black Han Sans',sans-serif;font-size:24px;margin-bottom:12px;color:var(--yellow);}
.provao-essay-prompt{font-size:16px;font-weight:700;background:rgba(255,255,255,0.15);padding:15px;border-radius:12px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.3);}
.btn-go-essay{background:var(--yellow);color:var(--dark);border:none;padding:16px 32px;border-radius:99px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #B45309;transition:.2s;}
.btn-go-essay:hover{transform:translateY(-2px);box-shadow:0 7px 0 #B45309;}

/* Header info */
.sim-header{margin-bottom:24px;}
.sim-breadcrumb{font-size:13px;font-weight:700;color:#888;margin-bottom:8px;}
.sim-breadcrumb a{color:var(--purple);cursor:pointer;}
.sim-h1{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--dark);margin-bottom:6px;}
.sim-meta{display:flex;gap:12px;flex-wrap:wrap;}
.sim-meta span{font-size:13px;font-weight:700;color:#555;background:#F3E8FF;border:2px solid #DDD6FE;border-radius:99px;padding:4px 12px;}

/* TELA DE INÍCIO */
.start-screen{text-align:center;padding:40px 20px;}
.start-icon{font-size:64px;margin-bottom:16px;}
.start-title{font-family:'Black Han Sans',sans-serif;font-size:34px;color:var(--dark);margin-bottom:8px;}
.start-info{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:20px 0;}
.start-info-item{background:#F3E8FF;border:2px solid #DDD6FE;border-radius:12px;padding:12px 18px;font-size:14px;font-weight:700;color:var(--purple);}
.btn-start-sim{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:18px;font-weight:900;padding:16px 40px;border-radius:99px;border:3px solid var(--dark);cursor:pointer;box-shadow:5px 5px 0 var(--dark);transition:.2s;animation:pulse 2.5s ease-in-out infinite;}
.btn-start-sim:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--dark);}

@media(max-width:600px){
  .q-card{padding:22px 18px;}
  .result-pct{font-size:64px;}
}

/* QUESTÃO DISCURSIVA */
.discursive-textarea {
  width: 100%;
  min-height: 200px;
  background: #F9F5FF;
  border: 2px solid #DDD6FE;
  border-radius: 16px;
  padding: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--dark);
  margin-bottom: 20px;
  outline: none;
  resize: vertical;
}
.discursive-textarea:focus { border-color: var(--purple); background: #fff; }
.btn-submit-discursive {
  background: var(--purple);
  color: #fff;
  border: 3px solid var(--dark);
  padding: 14px 28px;
  border-radius: 99px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 4px 4px 0 var(--dark);
  transition: .2s;
  width: 100%;
}
.btn-submit-discursive:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--dark); }
</style>
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:15px">
    <a href="dashboard.html" class="nav-back">← Sair</a>
    <div class="nav-brand">📝 ENEM na Prática</div>
  </div>
  <div class="nav-timer" id="timerDisplay">00:00</div>
</nav>

<div class="progress-bar-top">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="main">

  <!-- TELA DE INÍCIO -->
  <div id="startScreen" class="start-screen">
    <div class="start-icon">📝</div>
    <div class="start-title" id="startTitle">Carregando...</div>
    <div class="sim-meta" style="justify-content:center;margin:12px 0;" id="startMeta"></div>
    <div class="start-info" id="startInfo"></div>
    <p style="font-size:15px;font-weight:600;color:#555;max-width:480px;margin:0 auto 28px;line-height:1.7">Responda as questões no seu ritmo. Ao finalizar, você verá o gabarito comentado de cada questão e sua nota final.</p>
    <button class="btn-start-sim" onclick="iniciarSimulado()">🚀 Iniciar Simulado Agora</button>
  </div>

  <!-- SIMULADO ATIVO -->
  <div id="simScreen" style="display:none">
    <div class="sim-header" id="simHeader"></div>
    <div class="q-map" id="qMap"></div>
    <div id="questionArea"></div>
    <div class="q-nav" id="qNav"></div>
  </div>

  <!-- RESULTADO -->
  <div id="resultScreen" class="result-screen"></div>

</div>

<script>
// ─── LOAD SIMULADO ───
var params = new URLSearchParams(window.location.search);
var simId = parseInt(params.get('id')) || 1;
var sim = SIMULADOS.find(function(s){ return s.id === simId; });

if(!sim){
  // Fallback: cria simulado básico
  sim = {
    id:simId, num:String(simId).padStart(2,"0"), mat:"mat", matLabel:"Matemática",
    title:"Simulado " + simId, qs:5, time:"40min", status:"new",
    questoes:[
      {id:"fq1",enunciado:"Questão 1: Quanto é 2+2?",alternativas:["A) 3","B) 4","C) 5","D) 6","E) 7"],gabarito:"B",explicacao:"2+2=4"},
      {id:"fq2",enunciado:"Questão 2: Qual é a capital do Brasil?",alternativas:["A) São Paulo","B) Rio de Janeiro","C) Brasília","D) Belo Horizonte","E) Salvador"],gabarito:"C",explicacao:"Brasília é a capital federal desde 1960."},
      {id:"fq3",enunciado:"Questão 3: Quanto é 10×5?",alternativas:["A) 40","B) 45","C) 50","D) 55","E) 60"],gabarito:"C",explicacao:"10×5=50"},
      {id:"fq4",enunciado:"Questão 4: O símbolo químico do ouro é?",alternativas:["A) Ag","B) Fe","C) Au","D) Cu","E) Pt"],gabarito:"C",explicacao:"Au vem do latim 'Aurum'."},
      {id:"fq5",enunciado:"Questão 5: Quem escreveu 'Dom Casmurro'?",alternativas:["A) José de Alencar","B) Machado de Assis","C) Guimarães Rosa","D) Clarice Lispector","E) Carlos Drummond"],gabarito:"B",explicacao:"Dom Casmurro (1899) é de Machado de Assis, maior representante do Realismo brasileiro."}
    ]
  };
}

var matClass = {port:"mat-port",mat:"mat-mat",cn:"mat-cn",ch:"mat-ch",red:"mat-red",direito:"mat-direito",discursiva:"mat-red"};
var questoes = sim.questoes;
var currentQ = 0;
var respostas = {};
var timerInterval = null;
var elapsed = 0;
var simStarted = false;
var finished = false;

// ─── SETUP TELA INÍCIO ───
document.getElementById('startTitle').textContent = sim.title;
document.getElementById('startMeta').innerHTML =
  '<span class="sim-meta-item '+matClass[sim.mat]+'">'+sim.matLabel+'</span>' +
  '<span style="font-size:13px;font-weight:700;color:#555;background:#F3E8FF;border:2px solid #DDD6FE;border-radius:99px;padding:4px 12px;">Simulado '+sim.num+'</span>';
document.getElementById('startInfo').innerHTML =
  '<div class="start-info-item">📋 '+questoes.length+' questões</div>' +
  '<div class="start-info-item">⏱ '+sim.time+'</div>' +
  '<div class="start-info-item">📊 Gabarito comentado</div>' +
  '<div class="start-info-item">🏆 Resultado imediato</div>';

function iniciarSimulado(){
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('simScreen').style.display = 'block';
  simStarted = true;
  startTimer();
  renderHeader();
  renderMap();
  renderQuestion();
}

// ─── TIMER ───
function startTimer(){
  timerInterval = setInterval(function(){
    elapsed++;
    var m = Math.floor(elapsed/60);
    var s = elapsed%60;
    var str = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    var el = document.getElementById('timerDisplay');
    el.textContent = str;
    // Warning após 45min
    if(elapsed > 2700) el.classList.add('warning');
  }, 1000);
}

// ─── HEADER ───
function renderHeader(){
  document.getElementById('simHeader').innerHTML =
    '<div class="sim-breadcrumb"><a onclick="window.location.href=\'dashboard.html\'">Dashboard</a> › Simulados › ' + sim.title + '</div>' +
    '<div class="sim-h1">' + sim.title + '</div>' +
    '<div class="sim-meta"><span>'+sim.matLabel+'</span><span>'+questoes.length+' questões</span><span>'+sim.time+'</span></div>';
}

// ─── QUESTION MAP ───
function renderMap(){
  var dots = questoes.map(function(q,i){
    var classes = 'q-dot';
    if(i === currentQ) classes += ' current';
    if(respostas[i] !== undefined){
      if(finished) classes += respostas[i]===q.gabarito ? ' correct-dot' : ' wrong-dot';
      else classes += ' answered';
    }
    return '<div class="'+classes+'" onclick="goTo('+i+')">'+(i+1)+'</div>';
  }).join('');
  document.getElementById('qMap').innerHTML =
    '<div class="q-map-title">Mapa de questões</div><div class="q-map-dots">'+dots+'</div>';
}

function goTo(i){
  currentQ = i;
  renderMap();
  renderQuestion();
  renderNav();
}

// ─── QUESTION ───
function renderQuestion(){
  var q = questoes[currentQ];
  var answered = respostas[currentQ] !== undefined;
  var altsHtml = "";
  if(q.tipo === 'discursiva') {
    altsHtml = '<textarea class="discursive-textarea" id="discursiveInput" placeholder="Digite sua resposta técnica aqui..." '+(answered?'disabled':'')+'>'+(respostas[currentQ]||'')+'</textarea>';
    if(!answered) {
      altsHtml += '<button class="btn-submit-discursive" onclick="responderDiscursiva()">📤 Enviar Resposta para o Prof. Alberto</button>';
    }
  } else {
    altsHtml = '<div class="alts">' + q.alternativas.map(function(alt,i){
      var letter = letters[i];
      var cls = 'alt-btn';
      if(answered){
        if(letter === q.gabarito) cls += ' correct show-correct';
        else if(respostas[currentQ] === letter) cls += ' wrong';
      }
      return '<button class="'+cls+'" onclick="responder(\''+letter+'\')" '+(answered?'disabled':'')+'>'+
        '<div class="alt-letter">'+letter+'</div>'+
        '<span>'+alt.substring(3)+'</span></button>';
    }).join('') + '</div>';
  }

  var expHtml = answered ?
    '<div class="explicacao-box show"><div class="exp-title">✅ Resposta Esperada / Explicação</div>'+q.explicacao+'</div>' : '';

  // Progress
  var pct = Math.round((currentQ+1)/questoes.length*100);
  document.getElementById('progressFill').style.width = pct+'%';

  document.getElementById('questionArea').innerHTML =
    '<div class="q-card">' +
    '<div class="q-header">' +
      '<div class="q-num">'+String(currentQ+1).padStart(2,'0')+'</div>' +
      '<span class="q-mat '+matClass[sim.mat]+'">'+sim.matLabel+'</span>' +
    '</div>' +
    '<div class="q-enunciado">'+q.enunciado+'</div>' +
    '<div class="alts">'+altsHtml+'</div>' +
    expHtml +
    '</div>';

  renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─── RESPONDER ───
function responder(letter){
  if(respostas[currentQ] !== undefined) return;
  respostas[currentQ] = letter;
  renderMap();
  renderQuestion();

  // Auto-avança após 1.5s se correto
  if(letter === questoes[currentQ].gabarito && currentQ < questoes.length-1){
    setTimeout(function(){ nextQ(); }, 1800);
  }
}

function responderDiscursiva(){
  var val = document.getElementById('discursiveInput').value.trim();
  if(val.length < 10) { alert("Sua resposta está muito curta!"); return; }
  respostas[currentQ] = val;
  renderMap();
  renderQuestion();
}

function nextQ(){
  if(currentQ < questoes.length-1){
    currentQ++;
    renderMap();
    renderQuestion();
    renderNav();
  } else if(Object.keys(respostas).length === questoes.length){
    finalizarSimulado();
  }
}
function prevQ(){
  if(currentQ > 0){ currentQ--; renderMap(); renderQuestion(); renderNav(); }
}

// ─── NAV BUTTONS ───
function renderNav(){
  var answered = Object.keys(respostas).length;
  var isLast = currentQ === questoes.length-1;
  var allAnswered = answered === questoes.length;

  var html = '';
  if(currentQ > 0) html += '<button class="btn-prev" onclick="prevQ()">← Anterior</button>';
  else html += '<div></div>';

  if(isLast && allAnswered){
    html += '<button class="btn-finish" onclick="finalizarSimulado()">🏁 Ver Resultado</button>';
  } else if(isLast){
    html += '<button class="btn-next" onclick="nextQ()" style="opacity:.5" disabled>'+answered+'/'+questoes.length+' respondidas</button>';
  } else {
    html += '<button class="btn-next" onclick="nextQ()">Próxima →</button>';
  }
  document.getElementById('qNav').innerHTML = html;
}

// ─── FINALIZAR ───
function finalizarSimulado(){
  clearInterval(timerInterval);
  finished = true;
  
  var acertosFacil = 0, totalFacil = 0;
  var acertosMedio = 0, totalMedio = 0;
  var acertosDificil = 0, totalDificil = 0;
  var corretas = 0;

  questoes.forEach(function(q, i){
    var peso = q.n || 1; // n: nivel
    var acertou = respostas[i] === q.gabarito;
    if(acertou) corretas++;

    if(peso === 1) { totalFacil++; if(acertou) acertosFacil++; }
    else if(peso === 2) { totalMedio++; if(acertou) acertosMedio++; }
    else { totalDificil++; if(acertou) acertosDificil++; }
  });

  // Lógica TRI Simplificada
  // Pesos: Fácil: 10, Médio: 15, Difícil: 20
  var weightedScore = (acertosFacil * 10) + (acertosMedio * 15) + (acertosDificil * 20);
  var maxWeighted = (totalFacil * 10) + (totalMedio * 15) + (totalDificil * 20);
  var triScore = Math.round((weightedScore / maxWeighted) * 1000);
  
  // Penalidade de Coerência: Se errou muitas fáceis e acertou difíceis
  if(totalFacil > 0 && (acertosFacil / totalFacil) < 0.5 && acertosDificil > 0) {
    triScore = Math.round(triScore * 0.9); // 10% de penalidade por "chute" aparente
  }

  var pct = Math.round(corretas/questoes.length*100);
  var minutos = Math.floor(elapsed/60);
  var segundos = elapsed%60;
  var tempoStr = minutos+'min '+ segundos+'s';

  var emoji = triScore >= 800 ? '🏆' : triScore >= 600 ? '😊' : triScore >= 400 ? '📚' : '💪';
  var msg = triScore >= 800 ? 'Incrível! Sua nota TRI está no nível dos aprovados em Medicina. Domínio total!' :
            triScore >= 600 ? 'Ótimo desempenho! Sua coerência pedagógica foi boa. Continue focado.' :
            triScore >= 400 ? 'Bom começo! Revise os conceitos básicos para subir sua nota TRI no próximo.' :
            'Não desanime! Foque nas questões fáceis primeiro para garantir uma base sólida no TRI.';

  // Build Gabarito Grid
  var gridHtml = '<div class="review-title">📊 Grade de Respostas (Gabarito)</div><div class="gabarito-grid">';
  questoes.forEach(function(q, i){
    var acertou = respostas[i] === q.gabarito;
    gridHtml += '<div class="g-cell '+(acertou?'c':'w')+'" title="Q'+(i+1)+'">'+(i+1)+'</div>';
  });
  gridHtml += '</div>';

  // Build Essay Section (if Provão)
  var essayHtml = '';
  if(sim.mat === 'provao' && sim.essayPrompt) {
    essayHtml = '<div class="provao-essay-box">' +
      '<div class="provao-essay-title">🚀 Fase 2: Redação do Provão</div>' +
      '<p style="font-size:14px;margin-bottom:15px;opacity:0.9;">Para concluir o Provão Geral, você deve desenvolver o seguinte tema:</p>' +
      '<div class="provao-essay-prompt">"'+sim.essayPrompt+'"</div>' +
      '<button class="btn-go-essay" onclick="irParaRedacao()">✍️ Escrever Redação Agora</button>' +
      '</div>';
  }

  // Build review
  var reviewHtml = '<div class="review-title">📋 Análise por Questão</div>';
  questoes.forEach(function(q,i){
    var acertou = respostas[i] === q.gabarito;
    reviewHtml += '<div class="review-item">' +
      '<div class="ri-q"><strong>Q'+String(i+1).padStart(2,'0')+'.</strong> '+q.enunciado.substring(0,120)+(q.enunciado.length>120?'...':'')+'</div>' +
      '<div class="ri-ans '+(acertou?'ri-correct':'ri-wrong')+'">'+(acertou?'✅':'❌')+' Sua resposta: '+(respostas[i]||'—')+' | Gabarito: '+q.gabarito+'</div>' +
      '<div class="ri-exp">'+q.explicacao+'</div>' +
      '</div>';
  });

  var result = document.getElementById('resultScreen');
  result.innerHTML =
    '<div class="result-icon">'+emoji+'</div>' +
    '<div class="result-title">Simulado Concluído!</div>' +
    '<div class="result-score-box">' +
      '<div class="result-pct" style="font-size:62px;">'+triScore+'</div>' +
      '<div class="result-label" style="font-size:18px;margin-top:-5px;">Sua Nota TRI Estimada</div>' +
      '<div class="result-stats">' +
        '<div class="rstat"><div class="rstat-val green">'+corretas+'</div><div class="rstat-lbl">Acertos</div></div>' +
        '<div class="rstat"><div class="rstat-val yellow">'+tempoStr+'</div><div class="rstat-lbl">Tempo</div></div>' +
        '<div class="rstat"><div class="rstat-val" style="color:#C4B5FD">'+pct+'%</div><div class="rstat-lbl">Precisão</div></div>' +
      '</div>' +
    '</div>' +
    '<p class="result-msg">'+msg+'</p>' +
    gridHtml +
    '<div>' +
      '<button class="btn-retry" onclick="resetSimulado()">🔄 Tentar Novamente</button>' +
      '<button class="btn-back-dash" onclick="window.location.href=\'dashboard.html\'">← Voltar ao Dashboard</button>' +
    '</div>' +
    essayHtml +
    reviewHtml;

  document.getElementById('simScreen').style.display = 'none';
  result.classList.add('show');
  document.getElementById('progressFill').style.width = '100%';
  window.scrollTo({top:0,behavior:'smooth'});
}

function irParaRedacao(){
  // Salva o tema no storage para o dashboard ler
  localStorage.setItem('red_tema_persistido', sim.essayPrompt);
  window.location.href = 'dashboard.html?tab=red';
}

function resetSimulado(){
  respostas = {};
  currentQ = 0;
  elapsed = 0;
  finished = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('resultScreen').innerHTML = '';
  document.getElementById('simScreen').style.display = 'block';
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('timerDisplay').classList.remove('warning');
  document.getElementById('progressFill').style.width = '0%';
  startTimer();
  renderMap();
  renderQuestion();
  renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
