<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Elite | ENEM na Prática</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6;
            --success: #22C55E;
            --bg: #F8FAFC;
            --text: #1E293B;
            --border: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
        
        .navbar {
            background: #fff; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .nav-back { color: var(--text); text-decoration: none; font-weight: 700; font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem; }
        .timer { font-family: 'Black Han Sans', sans-serif; font-size: 1.5rem; color: var(--primary); }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        
        .q-card { background: #fff; border: 1px solid var(--border); border-radius: 1.5rem; padding: 2.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .q-tag { background: #f3e8ff; color: var(--primary); font-size: 0.75rem; font-weight: 800; padding: 0.25rem 0.75rem; border-radius: 999px; margin-bottom: 1rem; display: inline-block; }
        .q-text { font-size: 1.125rem; font-weight: 600; line-height: 1.6; margin-bottom: 2rem; }

        .options { display: flex; flex-direction: column; gap: 1rem; }
        .option-btn {
            background: #fff; border: 1px solid var(--border); border-radius: 1rem;
            padding: 1.25rem; text-align: left; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 1rem; font-family: inherit; font-size: 1rem; font-weight: 600;
        }
        .option-btn:hover { border-color: var(--primary); background: #f5f3ff; }
        .option-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
        .opt-letter { width: 32px; height: 32px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }

        /* AREA DISCURSIVA / REDAÇÃO */
        .discursive-box { display: flex; flex-direction: column; gap: 1.5rem; }
        .essay-input { width: 100%; min-height: 250px; padding: 1.5rem; border: 1px solid var(--border); border-radius: 1rem; font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s; }
        .essay-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1); }
        
        .ai-btn {
            background: linear-gradient(135deg, #8B5CF6, #D946EF); color: white; border: none;
            padding: 1.25rem; border-radius: 1rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.75rem; box-shadow: 0 4px 6px rgba(139, 92, 246, 0.2);
        }

        .nav-btns { display: flex; justify-content: space-between; gap: 1rem; }
        .btn { background: #1e293b; color: white; border: none; padding: 1rem 2rem; border-radius: 999px; font-weight: 700; cursor: pointer; }
        .btn.primary { background: var(--primary); }

        /* MODAL IA */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-box { background: #fff; border-radius: 1.5rem; padding: 2rem; max-width: 600px; width: 100%; position: relative; }
        .modal-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; color: var(--primary); font-family: 'Black Han Sans', sans-serif; font-size: 1.25rem; }

        #startScreen { text-align: center; padding: 6rem 0; }
        #startScreen h1 { font-family: 'Black Han Sans', sans-serif; font-size: 2.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="dashboard.html" class="nav-back">← Voltar para Dashboard</a>
        <div class="timer" id="timer">00:00</div>
    </nav>

    <div class="container">
        <div id="startScreen">
            <h1 id="simTitle">Carregando...</h1>
            <p id="simInfo" style="margin-bottom: 2rem; color: #64748B; font-weight: 600;"></p>
            <button class="btn primary" onclick="startSim()">INICIAR SIMULADO AGORA</button>
        </div>

        <div id="simScreen" style="display:none">
            <div id="qArea"></div>
            <div class="nav-btns">
                <button class="btn" onclick="prev()">← Anterior</button>
                <button class="btn primary" id="nextBtn" onclick="next()">Próximo →</button>
            </div>
        </div>
    </div>

    <!-- MODAL PROFESSOR ALBERTO -->
    <div class="modal" id="aiModal">
        <div class="modal-box">
            <div class="modal-header">👨‍🏫 Professor Alberto (IA)</div>
            <div id="aiResponse" style="line-height: 1.6; margin-bottom: 1.5rem; font-weight: 500;">Analisando sua resposta...</div>
            <button class="btn primary" style="width: 100%;" onclick="closeAI()">Entendido, Professor!</button>
        </div>
    </div>

    <script src="simulados-data.js"></script>
    <script src="src/js/simulados-extra.js"></script>
    <script src="src/js/simulados-extra2.js"></script>
    <script src="src/js/provao-data.js"></script>

    <script>
        let sim = null;
        let currentQ = 0;
        let answers = {};
        let time = 0;
        let timer = null;

        function load() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            
            let all = [];
            if (typeof SIMULADOS !== 'undefined') all = SIMULADOS;
            else if (window.SIMULADOS) all = window.SIMULADOS;

            sim = all.find(s => s.id === id);
            if(!sim) return;

            document.getElementById('simTitle').textContent = sim.title;
            document.getElementById('simInfo').textContent = `${sim.qs} questões · ${sim.matLabel || 'Simulado'}`;
        }

        function startSim() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('simScreen').style.display = 'block';
            render();
            timer = setInterval(() => {
                time++;
                const m = Math.floor(time/60);
                const s = time%60;
                document.getElementById('timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        function render() {
            const q = sim.questoes[currentQ];
            const area = document.getElementById('qArea');
            const nextBtn = document.getElementById('nextBtn');

            nextBtn.textContent = currentQ === sim.questoes.length - 1 ? 'FINALIZAR' : 'Próximo →';

            let html = `
                <div class="q-card">
                    <div class="q-tag">Questão ${currentQ + 1} de ${sim.qs}</div>
                    <div class="q-text">${q.enunciado}</div>`;

            if (q.alternativas) {
                html += `<div class="options">` + q.alternativas.map((opt, i) => {
                    const letter = ['A','B','C','D','E'][i];
                    return `<button class="option-btn ${answers[currentQ] === letter ? 'selected' : ''}" onclick="ans('${letter}')">
                        <div class="opt-letter">${letter}</div>
                        <div>${opt}</div>
                    </button>`;
                }).join('') + `</div>`;
            } else {
                html += `
                    <div class="discursive-box">
                        <textarea class="essay-input" id="discInp" placeholder="Escreva sua resposta aqui..." oninput="saveDisc(this.value)">${answers[currentQ] || ''}</textarea>
                        <button class="ai-btn" onclick="corrigirIA()">
                            <span>🤖</span> SOLICITAR CORREÇÃO PROF. ALBERTO (IA)
                        </button>
                    </div>`;
            }

            html += `</div>`;
            area.innerHTML = html;
        }

        function ans(l) { answers[currentQ] = l; render(); }
        function saveDisc(v) { answers[currentQ] = v; }
        function prev() { if(currentQ > 0) { currentQ--; render(); } }
        function next() {
            if(currentQ < sim.questoes.length - 1) { currentQ++; render(); }
            else { alert('Simulado Finalizado!'); window.location.href='dashboard.html'; }
        }

        async function corrigirIA() {
            const text = document.getElementById('discInp').value;
            if(text.length < 50) { alert('Escreva pelo menos 50 caracteres para correção.'); return; }
            
            document.getElementById('aiModal').style.display = 'flex';
            document.getElementById('aiResponse').textContent = 'Analisando sua resposta com critério ENEM...';

            try {
                const resp = await fetch('/api/ai-correction', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        enunciado: sim.questoes[currentQ].enunciado,
                        resposta: text,
                        materia: sim.matLabel
                    })
                });
                const data = await resp.json();
                document.getElementById('aiResponse').innerHTML = data.correction.replace(/\n/g, '<br>');
            } catch(e) {
                document.getElementById('aiResponse').innerHTML = "<b>Erro na conexão com Professor Alberto.</b> No ambiente local a IA é simulada, no ar ela funciona 100%.";
            }
        }

        function closeAI() { document.getElementById('aiModal').style.display = 'none'; }

        window.onload = load;
    </script>
</body>
</html>
