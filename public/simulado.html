<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Simulado | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
/* CSS PADRÃO DO SIMULADO (MODO ANTIGO) */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.navbar{background:#7B2FBE;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(123,47,190,.3);color:#fff;}
.nav-back{background:rgba(255,255,255,.2);color:#fff;padding:8px 16px;border-radius:99px;font-weight:800;text-decoration:none;font-size:13px;}
.nav-timer{font-family:'Black Han Sans',sans-serif;font-size:24px;color:#FFD600;}

.main{max-width:900px;margin:20px auto;padding:0 20px;}
.q-card{background:#fff;border:3px solid #1a1a2e;border-radius:20px;padding:32px;box-shadow:6px 6px 0 #1a1a2e;margin-bottom:20px;}
.q-header{display:flex;justify-content:space-between;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #eee;}
.q-num{font-family:'Black Han Sans',sans-serif;font-size:20px;color:#7B2FBE;}
.q-enunciado{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:25px;}

.alts{display:flex;flex-direction:column;gap:10px;}
.alt-btn{display:flex;align-items:center;gap:15px;padding:16px;border:3px solid #1a1a2e;border-radius:15px;background:#fff;cursor:pointer;transition:.2s;text-align:left;font-family:'Nunito',sans-serif;font-weight:700;}
.alt-btn:hover{background:#F3E8FF;}
.alt-btn.selected{background:#7B2FBE;color:#fff;}
.alt-letter{width:32px;height:32px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-weight:900;}

.q-nav{display:flex;justify-content:space-between;margin-top:20px;}
.btn-nav{background:#1a1a2e;color:#fff;border:none;padding:12px 25px;border-radius:99px;font-weight:800;cursor:pointer;}

.start-screen{text-align:center;padding:100px 0;}
.start-title{font-family:'Black Han Sans',sans-serif;font-size:32px;margin-bottom:10px;}
</style>
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:15px">
    <a href="dashboard.html" class="nav-back">← Sair</a>
    <div style="font-family:'Black Han Sans',sans-serif;font-size:18px;">SIMULADO ENEM</div>
  </div>
  <div class="nav-timer" id="timerDisplay">00:00</div>
</nav>

<div class="main">
  <div id="startScreen" class="start-screen">
    <h1 class="start-title" id="startTitle">Carregando...</h1>
    <div id="startInfo" style="margin-bottom:30px;font-weight:700;"></div>
    <button class="btn-nav" style="padding:15px 40px;" onclick="iniciar()">COMEÇAR AGORA</button>
  </div>

  <div id="simScreen" style="display:none">
    <div id="questionArea"></div>
    <div class="q-nav">
      <button class="btn-nav" onclick="prev()">← Anterior</button>
      <button class="btn-nav" id="btnNext" onclick="next()">Próximo →</button>
    </div>
  </div>
</div>

<script src="simulados-data.js"></script>
<script src="src/js/simulados-extra.js"></script>
<script src="src/js/simulados-extra2.js"></script>
<script src="src/js/provao-data.js"></script>

<script>
var sim = null;
var currentQ = 0;
var respostas = {};
var elapsed = 0;
var timer = null;

function load(){
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  
  let all = [];
  if (typeof SIMULADOS !== 'undefined') all = SIMULADOS;
  else if (window.SIMULADOS) all = window.SIMULADOS;

  sim = all.find(x => x.id === id);
  if(!sim) return;
  document.getElementById('startTitle').textContent = sim.title;
  document.getElementById('startInfo').textContent = `${sim.qs} questões · ${sim.time}`;
}

function iniciar(){
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('simScreen').style.display = 'block';
  render();
  timer = setInterval(() => {
    elapsed++;
    const m = Math.floor(elapsed/60);
    const s = elapsed%60;
    document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function render(){
  const q = sim.questoes[currentQ];
  let html = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Questão ${currentQ + 1}</div></div>
      <div class="q-enunciado">${q.enunciado}</div>
      <div class="alts">
        ${(q.alternativas||[]).map((alt, i) => {
          const letter = ['A','B','C','D','E'][i];
          return `<button class="alt-btn ${respostas[currentQ]===letter?'selected':''}" onclick="responder('${letter}')">
            <div class="alt-letter">${letter}</div><div>${alt}</div>
          </button>`;
        }).join('')}
      </div>
    </div>`;
  document.getElementById('questionArea').innerHTML = html;
}

function responder(letter){ respostas[currentQ]=letter; render(); }
function prev(){ if(currentQ>0){ currentQ--; render(); } }
function next(){
  if(currentQ < sim.questoes.length-1){ currentQ++; render(); }
  else { alert('Simulado finalizado!'); window.location.href='dashboard.html'; }
}

window.onload = load;
</script>
</body>
</html>
