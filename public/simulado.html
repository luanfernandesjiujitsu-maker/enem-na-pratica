<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Simulado | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>

<!-- CARREGANDO DADOS -->
<script src="simulados-data.js"></script>
<script src="src/js/simulados-extra.js"></script>
<script src="src/js/simulados-extra2.js"></script>
<script src="src/js/provao-data.js"></script>
<!-- Scripts Legais -->
<script src="src/js/direito-completo.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;min-height:100vh;-webkit-font-smoothing:antialiased;}
:root{--pink:#FF2D8B;--purple:#7B2FBE;--yellow:#FFD600;--dark:#1a1a2e;--green:#16A34A;--red:#DC2626;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,47,190,.4)}70%{box-shadow:0 0 0 10px rgba(123,47,190,0)}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* NAV */
.navbar{background:var(--purple);padding:0 24px;height:65px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 20px rgba(0,0,0,.3);border-bottom:2px solid rgba(255,214,0,.3);}
.nav-brand{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--yellow);display:flex;align-items:center;gap:10px;}
.nav-back{display:flex;align-items:center;gap:6px;color:#fff;background:rgba(255,255,255,.15);padding:8px 16px;border-radius:99px;font-size:13px;font-weight:800;cursor:pointer;transition:.2s;text-decoration:none;}
.nav-back:hover{background:rgba(255,255,255,.25);transform:translateX(-3px);}
.nav-timer{background:var(--dark);border:2px solid var(--yellow);border-radius:99px;padding:6px 20px;font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--yellow);letter-spacing:.05em;box-shadow:0 0 15px rgba(255,214,0,.2);}
.nav-timer.warning{color:#FC8181;border-color:#FC8181;}

.progress-bar-top{height:4px;background:rgba(255,255,255,.15);position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--pink));transition:width .4s ease;}

.main{max-width:760px;margin:0 auto;padding:32px 24px 80px;}

.q-card{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:32px 28px;box-shadow:5px 5px 0 var(--dark);animation:fadeUp .4s ease both;margin-bottom:24px;}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.q-num{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--purple);line-height:1;}
.q-mat{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:99px;border:2px solid var(--dark);}
.mat-port{background:#FFE4E6;color:#BE123C;}
.mat-mat{background:#DBEAFE;color:#1D4ED8;}
.mat-cn{background:#DCFCE7;color:#15803D;}
.mat-ch{background:#FEF3C7;color:#B45309;}
.mat-provao{background:var(--yellow);color:var(--dark);}
.q-enunciado{font-size:16px;font-weight:600;color:var(--dark);line-height:1.75;white-space:pre-wrap;margin-bottom:24px;}

.alts{display:flex;flex-direction:column;gap:10px;}
.alt-btn{
  display:flex;align-items:flex-start;gap:14px;
  background:#F8F0FF;border:2px solid #DDD6FE;
  border-radius:14px;padding:14px 18px;
  cursor:pointer;text-align:left;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--dark);
  transition:.2s;width:100%;
}
.alt-btn:hover{border-color:var(--purple);background:#EDE9FE;transform:translateX(4px);}
.alt-btn.selected{border-color:var(--purple);background:#EDE9FE;box-shadow:3px 3px 0 var(--purple);}
.alt-btn.correct{border-color:var(--green);background:#DCFCE7;box-shadow:3px 3px 0 var(--green);color:var(--green);}
.alt-btn.wrong{border-color:var(--red);background:#FEE2E2;box-shadow:3px 3px 0 var(--red);color:var(--red);animation:shake .3s ease;}
.alt-btn.show-correct{border-color:var(--green);background:#DCFCE7;}
.alt-letter{width:26px;height:26px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;margin-top:1px;}
.alt-btn.correct .alt-letter{background:var(--green);}
.alt-btn.wrong .alt-letter{background:var(--red);}
.alt-btn.show-correct .alt-letter{background:var(--green);}

.explicacao-box{
  background:#F0FDF4;border:2px solid #86EFAC;border-radius:14px;
  padding:18px 20px;margin-top:16px;
  font-size:14px;font-weight:600;color:#15803D;line-height:1.7;
  display:none;animation:fadeUp .3s ease both;white-space:pre-wrap;
}
.explicacao-box.show{display:block;}
.exp-title{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--green);margin-bottom:8px;}

.q-nav{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.btn-prev,.btn-next,.btn-finish{
  display:flex;align-items:center;gap:8px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;
  padding:13px 26px;border-radius:99px;border:3px solid var(--dark);
  cursor:pointer;transition:.2s;box-shadow:4px 4px 0 var(--dark);
}
.btn-prev{background:#fff;color:var(--dark);}
.btn-prev:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--dark);}
.btn-next{background:var(--purple);color:#fff;}
.btn-next:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--dark);}
.btn-finish{background:var(--yellow);color:var(--dark);}
.btn-finish:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--dark);}

.q-map{background:#fff;border:2px solid #DDD6FE;border-radius:16px;padding:16px;margin-bottom:24px;}
.q-map-title{font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:12px;}
.q-map-dots{display:flex;flex-wrap:wrap;gap:8px;}
.q-dot{
  width:34px;height:34px;border-radius:50%;
  border:2px solid #DDD6FE;
  background:#fff;color:var(--dark);
  font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;
}
.q-dot:hover{border-color:var(--purple);}
.q-dot.answered{background:var(--purple);color:#fff;border-color:var(--purple);}
.q-dot.current{border:2px solid var(--dark);box-shadow:2px 2px 0 var(--dark);}
.q-dot.correct-dot{background:var(--green);border-color:var(--green);color:#fff;}
.q-dot.wrong-dot{background:var(--red);border-color:var(--red);color:#fff;}

/* RESULTADO */
.result-screen{display:none;animation:fadeUp .5s ease both;text-align:center;}
.result-screen.show{display:block;}
.result-icon{font-size:80px;margin-bottom:16px;animation:pop .5s ease both;}
.result-title{font-family:'Black Han Sans',sans-serif;font-size:40px;color:var(--dark);margin-bottom:8px;}
.result-score-box{
  background:var(--purple);border:4px solid var(--dark);
  border-radius:24px;padding:36px;
  max-width:420px;margin:24px auto;
  box-shadow:8px 8px 0 var(--dark);
}
.result-pct{font-family:'Black Han Sans',sans-serif;font-size:70px;color:var(--yellow);line-height:1;}
.result-label{font-size:14px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:16px;}
.result-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
.rstat{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);border-radius:12px;padding:12px 16px;min-width:100px;}
.rstat-val{font-family:'Black Han Sans',sans-serif;font-size:26px;line-height:1;}
.rstat-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;}

.btn-retry, .btn-back-dash{display:inline-flex;align-items:center;gap:10px;padding:14px 30px;border-radius:99px;border:3px solid var(--dark);font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;transition:.2s;}
.btn-retry{background:var(--yellow);box-shadow:5px 5px 0 var(--dark);margin-right:10px;}
.btn-back-dash{background:#fff;box-shadow:5px 5px 0 var(--dark);}
.btn-retry:hover, .btn-back-dash:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--dark);}

.start-screen{text-align:center;padding:60px 20px;}
.start-icon{font-size:80px;margin-bottom:20px;animation:pulse 2s infinite;}
.start-title{font-family:'Black Han Sans',sans-serif;font-size:36px;color:var(--dark);margin-bottom:12px;}
.start-info{display:flex;gap:15px;justify-content:center;margin-bottom:30px;}
.start-item{background:#fff;border:2px solid var(--dark);padding:10px 20px;border-radius:99px;font-weight:800;font-size:14px;}
.btn-start{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;padding:18px 50px;font-family:'Black Han Sans',sans-serif;font-size:22px;border-radius:99px;border:3px solid var(--dark);cursor:pointer;box-shadow:6px 6px 0 var(--dark);transition:.2s;}
.btn-start:hover{transform:translate(-3px,-3px);box-shadow:9px 9px 0 var(--dark);}

@media(max-width:600px){
  .start-info{flex-direction:column;align-items:center;}
  .result-pct{font-size:50px;}
}
</style>
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:15px">
    <a href="dashboard.html" class="nav-back">← Sair</a>
    <div class="nav-brand">📝 ENEM na Prática</div>
  </div>
  <div class="nav-timer" id="timerDisplay">00:00</div>
</nav>

<div class="progress-bar-top">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="main">
  <!-- TELA INICIAL -->
  <div id="startScreen" class="start-screen">
    <div class="start-icon">✨</div>
    <h1 class="start-title" id="startTitle">Carregando...</h1>
    <div class="start-info" id="startInfo"></div>
    <button class="btn-start" onclick="iniciarSimulado()">COMEÇAR AGORA</button>
  </div>

  <!-- SIMULADO -->
  <div id="simScreen" style="display:none">
    <div class="q-map" id="qMap"></div>
    <div id="questionArea"></div>
    <div class="q-nav" id="qNav"></div>
  </div>

  <!-- RESULTADO -->
  <div id="resultScreen" class="result-screen"></div>
</div>

<script>
var currentQ = 0;
var respostas = {};
var timerInterval = null;
var elapsed = 0;
var sim = null;

function loadSimulado(){
  var params = new URLSearchParams(window.location.search);
  var id = parseInt(params.get('id'));
  
  // Acessa o array global SIMULADOS que deve estar preenchido pelos scripts
  var allData = [];
  if (typeof SIMULADOS !== 'undefined') allData = SIMULADOS;
  else if (window.SIMULADOS) allData = window.SIMULADOS;

  sim = allData.find(s => s.id === id);
  
  if(!sim){
    document.getElementById('startTitle').textContent = "Simulado não encontrado";
    return;
  }
  
  document.getElementById('startTitle').textContent = sim.title;
  document.getElementById('startInfo').innerHTML = 
    '<div class="start-item">📋 '+sim.qs+' questões</div>' +
    '<div class="start-item">⏱ '+sim.time+'</div>';
}

function iniciarSimulado(){
  if(!sim) return;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('simScreen').style.display = 'block';
  startTimer();
  renderQuestion();
  renderMap();
}

function startTimer(){
  timerInterval = setInterval(() => {
    elapsed++;
    var m = Math.floor(elapsed/60);
    var s = elapsed%60;
    document.getElementById('timerDisplay').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }, 1000);
}

function renderQuestion(){
  var q = sim.questoes[currentQ];
  var answered = respostas[currentQ] !== undefined;
  
  var html = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Questão ${currentQ + 1}</div>
        <div class="q-mat mat-${sim.mat}">${sim.matLabel}</div>
      </div>
      <div class="q-enunciado">${q.enunciado}</div>
      <div class="alts">
        ${q.alternativas.map((alt, i) => {
          var letter = ['A','B','C','D','E'][i];
          var cls = 'alt-btn';
          if(answered){
            if(letter === q.gabarito) cls += ' correct';
            else if(respostas[currentQ] === letter) cls += ' wrong';
          }
          return `<button class="${cls}" onclick="responder('${letter}')" ${answered?'disabled':''}>
            <div class="alt-letter">${letter}</div>
            <div>${alt}</div>
          </button>`;
        }).join('')}
      </div>
      <div class="explicacao-box ${answered?'show':''}">
        <div class="exp-title">Explicação Completa</div>
        ${q.explicacao}
      </div>
    </div>
  `;
  document.getElementById('questionArea').innerHTML = html;
  
  // Navigation
  var nav = '';
  if(currentQ > 0) nav += '<button class="btn-prev" onclick="prevQ()">← Anterior</button>';
  else nav += '<div></div>';
  
  if(currentQ < sim.questoes.length - 1) nav += '<button class="btn-next" onclick="nextQ()">Próxima →</button>';
  else nav += '<button class="btn-finish" onclick="finalizar()">Finalizar</button>';
  
  document.getElementById('qNav').innerHTML = nav;
  document.getElementById('progressFill').style.width = ((currentQ+1)/sim.questoes.length*100)+'%';
}

function renderMap(){
  var html = '<div class="q-map-dots">';
  sim.questoes.forEach((q, i) => {
    var cls = 'q-dot';
    if(i === currentQ) cls += ' current';
    if(respostas[i] !== undefined) cls += ' answered';
    html += `<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
  });
  html += '</div>';
  document.getElementById('qMap').innerHTML = '<div class="q-map-title">Mapa de Questões</div>' + html;
}

function responder(letter){
  if(respostas[currentQ] !== undefined) return;
  respostas[currentQ] = letter;
  renderQuestion();
  renderMap();
}

function nextQ(){ if(currentQ < sim.questoes.length - 1){ currentQ++; renderQuestion(); renderMap(); } }
function prevQ(){ if(currentQ > 0){ currentQ--; renderQuestion(); renderMap(); } }
function goTo(i){ currentQ = i; renderQuestion(); renderMap(); }

function finalizar(){
  clearInterval(timerInterval);
  var acertos = 0;
  sim.questoes.forEach((q, i) => { if(respostas[i] === q.gabarito) acertos++; });
  
  var score = Math.round((acertos/sim.questoes.length) * 1000);
  
  var html = `
    <div class="result-icon">🏆</div>
    <h2 class="result-title">Simulado Finalizado!</h2>
    <div class="result-score-box">
      <div class="result-pct">${score}</div>
      <div class="result-label">Sua Nota Estimada (TRI)</div>
      <div class="result-stats">
        <div class="rstat"><div class="rstat-val">${acertos}</div><div class="rstat-lbl">Acertos</div></div>
        <div class="rstat"><div class="rstat-val">${Math.floor(elapsed/60)}m</div><div class="rstat-lbl">Tempo</div></div>
      </div>
    </div>
    <div style="margin-top:30px">
      <button class="btn-back-dash" onclick="window.location.href='dashboard.html'">Voltar ao Dashboard</button>
    </div>
  `;
  document.getElementById('simScreen').style.display = 'none';
  document.getElementById('resultScreen').innerHTML = html;
  document.getElementById('resultScreen').style.display = 'block';
}

// Inicializa quando os scripts carregarem
window.onload = loadSimulado;
</script>
</body>
</html>
