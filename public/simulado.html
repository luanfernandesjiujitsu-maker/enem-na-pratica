<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Simulado | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
  :root{
    --pink:#FF2D8B;--purple:#7B2FBE;--yellow:#FFD600;
    --dark:#1a1a2e;--bg:#F8F0FF;--white:#fff;
    --green:#16A34A;--red:#DC2626;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

  /* NAVBAR */
  .navbar{background:var(--purple);padding:0 24px;height:70px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 0 var(--dark);}
  .nav-brand{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--yellow);text-decoration:none;display:flex;align-items:center;gap:10px;}
  .nav-timer{background:var(--dark);color:var(--yellow);padding:8px 20px;border-radius:99px;font-family:'Black Han Sans',sans-serif;font-size:1.2rem;border:2px solid var(--yellow);}
  .btn-back{color:white;text-decoration:none;font-weight:900;font-size:0.9rem;background:rgba(255,255,255,0.1);padding:8px 16px;border-radius:99px;}

  /* MAIN CANVAS */
  .container{max-width:800px;margin:40px auto;padding:0 20px;}
  .q-card{background:var(--white);border:4px solid var(--dark);border-radius:32px;padding:40px;box-shadow:8px 8px 0 var(--dark);margin-bottom:30px;}
  .q-num{font-family:'Black Han Sans',sans-serif;font-size:2rem;color:var(--purple);margin-bottom:20px;display:block;}
  .q-text{font-size:1.2rem;line-height:1.7;font-weight:600;margin-bottom:30px;white-space:pre-wrap;}

  /* OPTIONS */
  .options{display:flex;flex-direction:column;gap:12px;}
  .opt-btn{
    background:var(--bg);border:3px solid #DDD6FE;padding:18px 24px;border-radius:18px;
    text-align:left;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:700;
    cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:15px;
  }
  .opt-btn:hover{border-color:var(--purple);background:#EDE9FE;transform:translateX(5px);}
  .opt-btn.selected{background:var(--purple);color:white;border-color:var(--dark);box-shadow:4px 4px 0 var(--dark);}
  .opt-letter{width:32px;height:32px;background:var(--dark);color:white;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:900;font-size:0.9rem;}

  /* NAVIGATION */
  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:40px;}
  .btn-nav{
    background:var(--yellow);color:var(--dark);padding:15px 35px;border-radius:99px;
    font-family:'Black Han Sans',sans-serif;font-size:1.2rem;border:3px solid var(--dark);
    box-shadow:4px 4px 0 var(--dark);cursor:pointer;transition:0.2s;
  }
  .btn-nav:hover{transform:translateY(-2px);box-shadow:6px 6px 0 var(--dark);}
  .btn-finish{background:var(--pink);color:white;border-color:var(--dark);}

  /* PROGRESS */
  .prog-bar{height:10px;background:rgba(255,255,255,0.2);position:fixed;top:70px;width:100%;z-index:90;}
  .prog-fill{height:100%;background:var(--yellow);width:0%;transition:0.4s;}
</style>
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:15px">
    <a href="dashboard.html" class="btn-back">← SAIR</a>
    <a href="dashboard.html" class="nav-brand">📝 ENEM na Prática</a>
  </div>
  <div class="nav-timer">00:00</div>
</nav>

<div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>

<main class="container">
  <div id="startScreen" style="text-align:center;padding:60px 0;">
    <h1 style="font-family:'Black Han Sans',sans-serif;font-size:3.5rem;margin-bottom:20px;">Pronto para<br/><span style="color:var(--purple)">DESTRUIR?</span> 🚀</h1>
    <p style="font-size:1.4rem;font-weight:700;margin-bottom:40px;opacity:0.7;">Prepare-se. O cronômetro começa agora.</p>
    <button onclick="startSim()" class="btn-nav" style="padding:25px 60px;font-size:2rem;">INICIAR SIMULADO</button>
  </div>

  <div id="simScreen" style="display:none">
    <div class="q-card">
      <span class="q-num">Questão 01</span>
      <div class="q-text" id="qText">Carregando questão...</div>
      <div class="options" id="optionsBox"></div>
    </div>
    
    <div class="q-nav">
      <button onclick="prev()" class="btn-nav" style="background:white;">← VOLTAR</button>
      <button onclick="next()" id="btnNext" class="btn-nav">PRÓXIMA →</button>
    </div>
  </div>
</main>

<script src="src/js/data.js?v=99"></script>
<script src="src/js/provao-data.js?v=99"></script>
<script>
  let current = 0;
  let simId = new URLSearchParams(window.location.search).get('id') || 1;
  let questions = [];

  function startSim(){
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('simScreen').style.display = 'block';
    render();
  }

  function render(){
    // Lógica de renderização simplificada para demonstração rápida
    document.getElementById('qText').innerHTML = "O texto da questão carregado do banco de dados aparecerá aqui em instantes...";
    document.getElementById('optionsBox').innerHTML = ['A','B','C','D','E'].map(l => `
      <button class="opt-btn"><div class="opt-letter">${l}</div> <span>Alternativa carregando...</span></button>
    `).join('');
  }
</script>
</body>
</html>
