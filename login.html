<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Entrar | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
  :root{--pink:#FF2D8B;--purple:#7B2FBE;--yellow:#FFD600;--dark:#1a1a2e;--white:#fff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;min-height:100vh;display:flex;}
  .left-panel{flex:1;background:linear-gradient(135deg, var(--purple), var(--pink));display:flex;align-items:center;justify-content:center;color:white;text-align:center;padding:40px;}
  .right-panel{width:460px;background:white;display:flex;align-items:center;justify-content:center;padding:40px;}
  .login-box{width:100%;max-width:340px;}
  .btn-login{width:100%;background:var(--purple);color:#fff;padding:15px;border-radius:99px;border:3px solid var(--dark);font-family:'Black Han Sans',sans-serif;font-size:18px;cursor:pointer;box-shadow:5px 5px 0 var(--dark);}
  .f-input{width:100%;padding:13px;border:3px solid #eee;border-radius:14px;margin-bottom:15px;font-family:'Nunito',sans-serif;font-weight:600;}
  @media(max-width:900px){.left-panel{display:none;}.right-panel{width:100%;}}
</style>
</head>
<body>

<div class="left-panel">
  <div>
    <h1 style="font-family:'Black Han Sans',sans-serif;font-size:3rem;margin-bottom:20px;">ENEM na Prática</h1>
    <p style="font-size:1.2rem;">Sua aprovação começa aqui.</p>
  </div>
</div>

<div class="right-panel">
  <div class="login-box">
    <h2 style="font-family:'Black Han Sans',sans-serif;font-size:24px;margin-bottom:30px;">Entrar na Plataforma</h2>
    <input type="email" id="email" class="f-input" placeholder="Seu e-mail"/>
    <input type="password" id="password" class="f-input" placeholder="Sua senha"/>
    <button class="btn-login" id="btnLogin">ENTRAR AGORA →</button>
    <p style="margin-top:20px;text-align:center;font-weight:700;">Não tem conta? <a href="index.html" style="color:var(--purple);">Comprar acesso</a></p>
  </div>
</div>


  <script type="module">
    import { login } from './src/js/auth.js';

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');

      if (!email || !password) {
        alert('Por favor, preencha todos os campos.');
        return;
      }

      try {
        btn.innerText = 'CARREGANDO...';
        btn.disabled = true;
        await login(email, password);
        window.location.href = 'dashboard.html';
      } catch (error) {
        alert('Erro ao entrar: ' + (error.message || 'Verifique suas credenciais'));
        btn.innerText = 'ENTRAR AGORA →';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
