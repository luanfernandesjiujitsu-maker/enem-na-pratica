<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard Elite | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;overflow-x:hidden;}

:root{
  --purple:#7B2FBE; --purple-dark:#5B21B6;
  --yellow:#FFD600; --yellow-light:#FFE44D;
  --dark:#1a1a2e; --white:#fff;
  --bg:#F8F0FF;
}

/* NAVBAR ELITE */
.navbar{
  background:var(--purple);
  padding:0 24px; height:64px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  box-shadow:0 4px 20px rgba(123,47,190,.3);
  border-bottom:3px solid var(--dark);
}
.nav-brand{
  font-family:'Black Han Sans',sans-serif;
  font-size:22px; color:var(--yellow);
  text-shadow:2px 2px 0 var(--dark);
}
.nav-user{ display:flex; align-items:center; gap:12px; }
.nav-av{ width:38px; height:38px; border-radius:50%; border:2px solid var(--yellow); background:var(--white); display:flex; align-items:center; justify-content:center; font-weight:900; color:var(--purple); }

/* HERO */
.hero{
  background:linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
  padding:40px 24px; color:white; border-bottom:3px solid var(--dark);
  text-align:center;
}
.hero h1{ font-family:'Black Han Sans',sans-serif; font-size:38px; margin-bottom:10px; color:var(--white); }
.hero h1 span{ color:var(--yellow); }
.hero-stats{ display:flex; justify-content:center; gap:15px; margin-top:20px; flex-wrap:wrap; }
.stat-box{ background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); border-radius:12px; padding:10px 20px; min-width:140px; }
.stat-val{ font-family:'Black Han Sans',sans-serif; font-size:24px; color:var(--yellow); }
.stat-label{ font-size:10px; font-weight:800; text-transform:uppercase; opacity:0.7; }

/* TABS ELITE (ESTILO BOTÃO FÍSICO) */
.tabs-wrap{ max-width:1100px; margin:20px auto; padding:0 20px; display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; }
.tab-btn{
  padding:10px 20px; background:white; border:3px solid var(--dark); border-radius:12px;
  font-weight:900; font-size:14px; cursor:pointer; color:var(--dark);
  box-shadow:4px 4px 0 var(--dark); transition:0.2s; white-space:nowrap;
}
.tab-btn:hover{ transform:translate(-2px, -2px); box-shadow:6px 6px 0 var(--dark); }
.tab-btn.active{ background:var(--yellow); transform:translate(2px, 2px); box-shadow:0 0 0 var(--dark); }

/* GRID */
.container{ max-width:1100px; margin:0 auto; padding:20px; }
.sim-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:15px; }
.sim-card{
  background:white; border:3px solid var(--dark); border-radius:16px;
  padding:20px; box-shadow:4px 4px 0 var(--dark); transition:0.2s;
  cursor:pointer; text-decoration:none; color:inherit;
  display:flex; flex-direction:column; gap:10px;
}
.sim-card:hover{ transform:translate(-3px, -3px); box-shadow:7px 7px 0 var(--purple); border-color:var(--purple); }

.card-num{ font-family:'Black Han Sans',sans-serif; font-size:28px; color:var(--purple); }
.card-tag{ font-size:10px; font-weight:900; text-transform:uppercase; padding:4px 10px; border-radius:99px; width:fit-content; border:2px solid var(--dark); }
.card-title{ font-weight:800; font-size:15px; line-height:1.3; min-height:40px; }
.card-footer{ display:flex; align-items:center; justify-content:space-between; border-top:1px solid #eee; padding-top:10px; font-size:12px; font-weight:700; color:#666; }

/* CORES TAGS */
.tag-red{ background:#F3E8FF; color:#7C3AED; }
.tag-port{ background:#FFE4E6; color:#BE123C; }
.tag-mat{ background:#DBEAFE; color:#1D4ED8; }
.tag-ch{ background:#FEF3C7; color:#B45309; }
.tag-cn{ background:#DCFCE7; color:#15803D; }
.tag-provao{ background:var(--yellow); color:var(--dark); }

/* REDAÇÃO ELITE */
.red-section{ background:white; border:3px solid var(--dark); border-radius:24px; padding:30px; margin-top:40px; box-shadow:8px 8px 0 var(--dark); }
.red-paper{ border:2px solid #ddd; border-radius:8px; overflow:hidden; margin-bottom:20px; background:#fff; position:relative; }
.red-paper::before{ content:''; position:absolute; left:40px; top:0; bottom:0; width:2px; background:#fecaca; }

.line-wrap{ display:flex; border-bottom:1px solid #eee; min-height:36px; }
.line-num{ width:40px; background:#f9f9f9; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#ccc; border-right:1px solid #eee; }
.line-input{ flex:1; border:none; outline:none; padding:8px 15px; font-family:inherit; font-size:15px; resize:none; overflow:hidden; background:transparent; }

.btn-elite{
  display:block; width:100%; max-width:400px; margin:20px auto;
  background:var(--purple); color:white; border:3px solid var(--dark);
  padding:15px; border-radius:99px; font-family:'Black Han Sans',sans-serif;
  font-size:18px; cursor:pointer; box-shadow:4px 4px 0 var(--dark); transition:0.2s;
}
.btn-elite:hover{ transform:translate(-2px, -2px); box-shadow:6px 6px 0 var(--dark); background:var(--purple-dark); }

@media(max-width:768px){
  .sim-grid{ grid-template-columns:1fr; }
  .hero h1{ font-size:28px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">📝 ENEM NA PRÁTICA</div>
  <div class="nav-user">
    <div style="text-align:right"><div style="font-size:13px; font-weight:800; color:white;">Luan Fernandes</div><div style="font-size:10px; color:var(--yellow); font-weight:700;">DASHBOARD ELITE</div></div>
    <div class="nav-av">L</div>
  </div>
</nav>

<header class="hero">
  <h1>Bora conquistar sua <span>Vaga!</span></h1>
  <p style="font-weight:700; opacity:0.8;">A maior plataforma de simulados do Brasil</p>
  <div class="hero-stats">
    <div class="stat-box"><div class="stat-val" id="totalCount">85</div><div class="stat-label">Simulados</div></div>
    <div class="stat-box"><div class="stat-val">IA</div><div class="stat-label">Correção</div></div>
    <div class="stat-box"><div class="stat-val">ELITE</div><div class="stat-label">Padrão</div></div>
  </div>
</header>

<div class="tabs-wrap" id="tabsBox"></div>

<main class="container">
  <div class="sim-grid" id="mainGrid"></div>

  <!-- SEÇÃO REDAÇÃO -->
  <section class="red-section" id="redSection">
    <h2 style="font-family:'Black Han Sans',sans-serif; margin-bottom:10px;">✍️ Rascunho da Redação</h2>
    <p style="font-weight:700; color:#666; margin-bottom:20px; font-size:14px;">Use este espaço para organizar suas ideias. O texto é salvo automaticamente.</p>
    
    <div class="red-paper" id="rascunhoBox"></div>

    <h2 style="font-family:'Black Han Sans',sans-serif; margin-bottom:10px; margin-top:30px;">🖋️ Texto Definitivo</h2>
    <div class="red-paper" id="textoBox"></div>

    <button class="btn-elite">🚀 ENVIAR PARA CORREÇÃO POR IA</button>
  </section>
</main>

<script src="simulados-data.js"></script>
<script src="src/js/simulados-extra.js"></script>
<script src="src/js/simulados-extra2.js"></script>
<script src="src/js/provao-data.js"></script>

<script>
let currentTab = 'all';

function renderTabs(){
  const categories = [
    { id: 'all', label: 'Todos', icon: '🌟' },
    { id: 'red', label: 'Redação', icon: '✍️' },
    { id: 'port', label: 'Linguagens', icon: '📚' },
    { id: 'mat', label: 'Matemática', icon: '🔢' },
    { id: 'ch', label: 'Humanas', icon: '🌎' },
    { id: 'cn', label: 'Natureza', icon: '🧬' },
    { id: 'provao', label: 'Provões', icon: '🏆' }
  ];
  document.getElementById('tabsBox').innerHTML = categories.map(cat => `
    <button class="tab-btn ${currentTab === cat.id ? 'active' : ''}" onclick="setTab('${cat.id}')">
      ${cat.icon} ${cat.label}
    </button>
  `).join('');
}

function setTab(id){
  currentTab = id;
  renderTabs();
  renderSims();
}

function renderSims(){
  let allSims = [];
  if(typeof SIMULADOS !== 'undefined') allSims = SIMULADOS;
  else if(window.SIMULADOS) allSims = window.SIMULADOS;

  document.getElementById('totalCount').textContent = allSims.length;
  const filtered = allSims.filter(s => currentTab === 'all' || s.mat === currentTab);
  const grid = document.getElementById('mainGrid');

  if(filtered.length === 0){
    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px; font-weight:800; opacity:0.5;">AGUARDE CARREGANDO SIMULADOS...</p>';
    setTimeout(renderSims, 300);
    return;
  }

  grid.innerHTML = filtered.map(s => `
    <a href="simulado.html?id=${s.id}" class="sim-card">
      <div class="card-num">${s.num || s.id}</div>
      <div class="card-tag tag-${s.mat}">${s.matLabel || 'ENEM'}</div>
      <div class="card-title">${s.title}</div>
      <div class="card-footer">
        <span>⏱ ${s.time}</span>
        <span>${s.qs} Qs</span>
      </div>
    </a>
  `).join('');
}

function buildLines(){
  const rasc = document.getElementById('rascunhoBox');
  const text = document.getElementById('textoBox');
  let rHtml = '', tHtml = '';
  
  for(let i=1; i<=15; i++){
    rHtml += '<div class="line-wrap"><div class="line-num">'+i+'</div><textarea class="line-input" rows="1" oninput="autoExpand(this)"></textarea></div>';
  }
  for(let i=1; i<=30; i++){
    tHtml += '<div class="line-wrap"><div class="line-num">'+i+'</div><textarea class="line-input" rows="1" oninput="autoExpand(this)"></textarea></div>';
  }
  rasc.innerHTML = rHtml;
  text.innerHTML = tHtml;
}

function autoExpand(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

window.onload = () => {
  renderTabs();
  renderSims();
  buildLines();
};
</script>

</body>
</html>
