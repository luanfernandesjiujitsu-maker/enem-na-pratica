<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
img{display:block;max-width:100%;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#F8F0FF;}
::-webkit-scrollbar-thumb{background:#A855F7;border-radius:99px;}

:root{
  --pink:#FF2D8B;--pink2:#FF6BB5;
  --purple:#7B2FBE;--purple2:#A855F7;
  --yellow:#FFD600;--yellow2:#FFE44D;
  --dark:#1a1a2e;--dark2:#16213e;
  --bg:#F8F0FF;--bg2:#fff;--bg3:#F3E8FF;
  --white:#fff;--gray:#888;--gray2:#555;
  --green:#16A34A;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.btn-continue svg { width: 24px !important; height: 24px !important; flex-shrink: 0; }

.reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease;}
.reveal.in{opacity:1;transform:translateY(0);}

/* NAV */
.navbar{
  background:var(--purple);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(123,47,190,.3);
}
.nav-brand{
  font-family:'Black Han Sans',sans-serif;
  font-size:20px;letter-spacing:1px;color:var(--yellow);
  display:flex;align-items:center;gap:8px;
}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:99px;
  font-size:13px;font-weight:800;color:rgba(255,255,255,.7);
  transition:.2s;
}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-uname{font-size:13px;font-weight:800;color:#fff;}
.nav-urole{font-size:11px;color:rgba(255,255,255,.6);font-weight:600;}
.nav-av-wrap{position:relative;cursor:pointer;}
.nav-av{
  width:38px;height:38px;border-radius:50%;
  border:2px solid var(--yellow);object-fit:cover;
  transition:.2s;
}
.nav-av:hover{border-color:#fff;}

/* HERO */
.hero{
  background:linear-gradient(135deg,var(--purple) 0%,#5B21B6 100%);
  padding:52px 24px 64px;position:relative;overflow:hidden;
}
.hero-bg-txt{
  position:absolute;bottom:-30px;right:-20px;
  font-family:'Black Han Sans',sans-serif;font-size:180px;
  color:rgba(255,255,255,.04);line-height:1;
  pointer-events:none;user-select:none;
}
.hero-inner{
  max-width:1100px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:40px;flex-wrap:wrap;position:relative;z-index:2;
}
.hero-greeting{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,214,0,.15);border:2px solid rgba(255,214,0,.3);
  border-radius:99px;padding:5px 16px;
  font-size:12px;font-weight:800;color:var(--yellow);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;
}
.hero h1{
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(30px,5vw,48px);
  color:#fff;line-height:1.1;margin-bottom:10px;letter-spacing:.5px;
}
.hero h1 span{color:var(--yellow);}
.hero-sub{font-size:15px;color:rgba(255,255,255,.75);font-weight:600;margin-bottom:24px;max-width:420px;line-height:1.65;}
.btn-continue{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--yellow);color:var(--dark);
  font-size:15px;font-weight:900;
  padding:13px 28px;border-radius:99px;
  box-shadow:4px 4px 0 rgba(0,0,0,.2);
  transition:.2s;animation:pulse 2.5s ease infinite;border:none;cursor:pointer;
}
.btn-continue:hover{transform:translateY(-2px);box-shadow:4px 6px 0 rgba(0,0,0,.2);}
.btn-continue svg{width:16px;height:16px;stroke:var(--dark);stroke-width:2.5;fill:none;}

/* Stats */
.hero-stats{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
.stat-box{
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);
  border-radius:14px;padding:12px 18px;min-width:100px;text-align:center;
}
.stat-val{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--yellow);line-height:1;}
.stat-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}

/* Progress card */
.progress-card{
  background:rgba(255,255,255,.1);
  border:2px solid rgba(255,255,255,.15);
  border-radius:18px;padding:20px;
  min-width:240px;max-width:280px;
}
.prog-card-label{font-size:11px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.prog-card-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:12px;line-height:1.4;}
.prog-bar-wrap{height:8px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-bottom:6px;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--yellow));border-radius:99px;transition:width 1s ease;}
.prog-card-sub{font-size:12px;color:rgba(255,255,255,.55);font-weight:600;}

/* SECTIONS */
.section{padding:64px 24px;}
.section-white{background:#fff;}
.container{max-width:1100px;margin:0 auto;}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.sec-tag{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--purple);margin-bottom:6px;}
.sec-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(22px,3.5vw,32px);color:var(--dark);letter-spacing:.3px;}
.sec-link{font-size:13px;font-weight:800;color:var(--purple);}

.cat-section { width: 100%; margin-bottom: 50px; }
.sim-grid { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; width: 100%; }

/* Layout Masonry Todos */
#simGrid.all-grid { display: block !important; column-width: 300px; column-count: auto; column-gap: 30px; width: 100%; }
#simGrid.all-grid .cat-section { display: inline-block; width: 100%; break-inside: avoid; background: rgba(255, 255, 255, 0.4); padding: 20px; border-radius: 24px; border: 1px solid rgba(123, 47, 190, 0.1); margin-bottom: 30px; }
#simGrid.all-grid .sim-grid { display: flex !important; flex-direction: column; gap: 14px; }
#simGrid.all-grid .sim-card { flex: 1 1 100%; min-width: 100%; padding: 18px; border-radius: 18px; }

.sim-card {
  background: var(--bg2); border: 3px solid var(--dark); border-radius: 20px; padding: 24px 20px;
  box-shadow: 5px 5px 0 var(--dark); transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column; gap: 12px; text-decoration: none; position: relative;
}
.sim-card:hover { transform: translateY(-5px); box-shadow: 10px 10px 0 var(--purple); border-color: var(--purple); }
.sim-header { display: flex; align-items: center; justify-content: space-between; }
.sim-num { font-family: 'Black Han Sans', sans-serif; font-size: 28px; color: var(--purple); line-height: 1; }
.sim-status { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 99px; }
.s-done { background: #DCFCE7; color: #15803D; }
.s-new { background: #EDE9FE; color: #7C3AED; }
.sim-mat-tag { font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; }
.mat-port { background: #FFE4E6; color: #BE123C; }
.mat-mat { background: #DBEAFE; color: #1D4ED8; }
.mat-cn { background: #DCFCE7; color: #15803D; }
.mat-ch { background: #FEF3C7; color: #B45309; }
.mat-provao { background: linear-gradient(135deg, #7B2FBE, #FF2D8B); color: #fff; }

/* TABS */
.tabs-wrapper { margin-bottom: 24px; display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; }
.tab-item { padding: 10px 22px; background: #fff; border: 2px solid #DDD6FE; border-radius: 99px; font-size: 14px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.tab-item.active { background: var(--purple); color: #fff; border-color: var(--purple); }

.site-footer{background:var(--dark);color:#fff;padding:36px 24px;text-align:center;border-top:4px solid var(--purple);}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">📝 ENEM na Prática</div>
</nav>

<header class="hero">
  <div class="hero-inner">
    <div>
      <h1>Continue de onde<br/>você <span>parou!</span></h1>
      <div class="hero-stats">
        <div class="stat-box"><div class="stat-val" id="st-sims">0</div><div class="stat-label">Simulados feitos</div></div>
        <div class="stat-box"><div class="stat-val" id="st-score">0</div><div class="stat-label">Pontos médios</div></div>
        <div class="stat-box"><div class="stat-val">80</div><div class="stat-label">Total ENEM</div></div>
      </div>
      <button class="btn-continue" onclick="window.location.href='simulado.html?id=1'">
        Iniciar Próximo Simulado
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="sec-head">
      <h2 class="sec-title">🎯 Seus Simulados ENEM</h2>
    </div>
    <div class="tabs-wrapper" id="tabsBox"></div>
    <div id="simGrid"></div>
  </div>
</section>

<footer class="site-footer">
  <div style="font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--yellow);">📝 ENEM na Prática</div>
  <p>© 2025 · Todos os direitos reservados</p>
</footer>

<script src="src/js/data.js?v=90"></script>
<script src="src/js/simulados-extra.js?v=90"></script>
<script src="src/js/simulados-extra2.js?v=90"></script>
<script src="src/js/provao-data.js?v=90"></script>

<script>
var simulados = window.SIMULADOS || [];
var activeTab = 'all';

function renderTabs(){
  var categories = [
    { key: 'all', label: 'Todos', icon: '🌟' },
    { key: 'port', label: 'Linguagens', icon: '📚' },
    { key: 'ch', label: 'C. Humanas', icon: '🌍' },
    { key: 'cn', label: 'C. Natureza', icon: '🧬' },
    { key: 'mat', label: 'Matemática', icon: '🔢' }
  ];
  document.getElementById('tabsBox').innerHTML = categories.map(function(cat){
    return '<div class="tab-item '+(activeTab===cat.key?'active':'')+'" onclick="setTab(\''+cat.key+'\')">' + cat.icon + ' ' + cat.label + '</div>';
  }).join('');
}

function setTab(key){ activeTab = key; renderTabs(); renderSims(); }

function renderSims(){
  var categories = [
    { key: 'port', label: 'Linguagens', icon: '📚', color: '#BE123C' },
    { key: 'ch', label: 'Ciências Humanas', icon: '🌍', color: '#B45309' },
    { key: 'cn', label: 'Ciências da Natureza', icon: '🧬', color: '#15803D' },
    { key: 'mat', label: 'Matemática', icon: '🔢', color: '#1D4ED8' }
  ];

  var html = '';
  var container = document.getElementById('simGrid');
  container.className = activeTab === 'all' ? 'all-grid' : 'single-grid';

  categories.forEach(function(cat){
    if(activeTab !== 'all' && activeTab !== cat.key) return;
    var items = simulados.filter(function(s){ return s.mat === cat.key; });
    if(items.length === 0) return;

    html += '<div class="cat-section"><h3>'+cat.label+'</h3><div class="sim-grid">';
    html += items.map(function(s){
      return '<a href="simulado.html?id='+s.id+'" class="sim-card">'
        +'<div class="sim-header"><div class="sim-num">'+s.num+'</div><span class="sim-status s-new">Novo</span></div>'
        +'<span class="sim-mat-tag mat-'+s.mat+'">'+s.matLabel+'</span>'
        +'<h4>'+s.title+'</h4>'
        +'<div class="sim-card-footer"><span>⏱ '+s.time+' · '+s.qs+' questões</span></div>'
        +'</a>';
    }).join('');
    html += '</div></div>';
  });
  container.innerHTML = html;
}

window.onload = function(){ renderTabs(); renderSims(); };
</script>
</body>
</html>
