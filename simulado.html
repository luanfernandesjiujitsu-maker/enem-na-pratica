<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Elite | ENEM na Prática</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6;
            --success: #22C55E;
            --bg: #F8FAFC;
            --text: #1E293B;
            --border: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
        
        .navbar {
            background: #fff; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .nav-back { color: var(--text); text-decoration: none; font-weight: 700; font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem; }
        .timer { font-family: 'Black Han Sans', sans-serif; font-size: 1.5rem; color: var(--primary); }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .q-card { background: #fff; border: 1px solid var(--border); border-radius: 1.5rem; padding: 2.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .q-tag { background: #f3e8ff; color: var(--primary); font-size: 0.75rem; font-weight: 800; padding: 0.25rem 0.75rem; border-radius: 999px; margin-bottom: 1rem; display: inline-block; }
        .q-text { font-size: 1.125rem; font-weight: 600; line-height: 1.6; margin-bottom: 2rem; }

        .options { display: flex; flex-direction: column; gap: 1rem; }
        .option-btn {
            background: #fff; border: 1px solid var(--border); border-radius: 1rem;
            padding: 1.25rem; text-align: left; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 1rem; font-family: inherit; font-size: 1rem; font-weight: 600;
        }
        .option-btn:hover { border-color: var(--primary); background: #f5f3ff; }
        .option-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
        .opt-letter { width: 32px; height: 32px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }

        .nav-btns { display: flex; justify-content: space-between; gap: 1rem; }
        .btn { background: #1e293b; color: white; border: none; padding: 1rem 2rem; border-radius: 999px; font-weight: 700; cursor: pointer; }
        .btn.primary { background: var(--primary); }
        .ai-btn { background: linear-gradient(135deg, #8B5CF6, #D946EF); color: white; border: none; padding: 1.25rem; border-radius: 1rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; margin-top: 1rem; }

        #startScreen { text-align: center; padding: 6rem 0; }
        #startScreen h1 { font-family: 'Black Han Sans', sans-serif; font-size: 2.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="nav-back">← Voltar para Dashboard</a>
        <div class="timer" id="timer">00:00</div>
    </nav>
    <div class="container">
        <div id="startScreen">
            <h1 id="simTitle">Carregando...</h1>
            <button class="btn primary" onclick="startSim()">INICIAR SIMULADO AGORA</button>
        </div>
        <div id="simScreen" style="display:none">
            <div id="qArea"></div>
            <div class="nav-btns">
                <button class="btn" onclick="prev()">← Anterior</button>
                <button class="btn primary" id="nextBtn" onclick="next()">Próximo →</button>
            </div>
        </div>
    </div>
    <script src="simulados-data.js"></script>
    <script src="src/js/simulados-extra.js"></script>
    <script src="src/js/simulados-extra2.js"></script>
    <script src="src/js/provao-data.js"></script>
    <script>
        let sim = null; let currentQ = 0; let answers = {}; let time = 0; let timer = null;
        function load() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            let all = window.SIMULADOS || [];
            sim = all.find(s => s.id === id);
            if(sim) document.getElementById('simTitle').textContent = sim.title;
        }
        function startSim() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('simScreen').style.display = 'block';
            render();
            timer = setInterval(() => {
                time++;
                const m = Math.floor(time/60), s = time%60;
                document.getElementById('timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }
        function render() {
            const q = sim.questoes[currentQ];
            const area = document.getElementById('qArea');
            let html = `<div class="q-card"><div class="q-tag">Questão ${currentQ + 1}</div><div class="q-text">${q.enunciado}</div>`;
            if (q.alternativas) {
                html += `<div class="options">` + q.alternativas.map((opt, i) => {
                    const letter = ['A','B','C','D','E'][i];
                    return `<button class="option-btn ${answers[currentQ] === letter ? 'selected' : ''}" onclick="ans('${letter}')"><div class="opt-letter">${letter}</div><div>${opt}</div></button>`;
                }).join('') + `</div>`;
            } else {
                html += `<textarea style="width:100%;min-height:200px;border-radius:1rem;padding:1rem;border:1px solid #ddd;" placeholder="Sua resposta..."></textarea><button class="ai-btn">🤖 PROFESSOR ALBERTO (IA)</button>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }
        function ans(l) { answers[currentQ] = l; render(); }
        function prev() { if(currentQ > 0) { currentQ--; render(); } }
        function next() { if(currentQ < sim.questoes.length - 1) { currentQ++; render(); } else { window.location.href='dashboard.html'; } }
        window.onload = load;
    </script>
</body>
</html>
