<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Simulado | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<script src="src/js/data.js?v=99"></script>
<script src="src/js/simulados-extra.js?v=99"></script>
<script src="src/js/provao-data.js?v=99"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;min-height:100vh;-webkit-font-smoothing:antialiased;}
:root{--pink:#FF2D8B;--purple:#7B2FBE;--yellow:#FFD600;--dark:#1a1a2e;--green:#16A34A;--red:#DC2626;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* NAV */
.navbar{background:var(--purple);padding:0 24px;height:65px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 20px rgba(0,0,0,.3);border-bottom:2px solid rgba(255,214,0,.3);}
.nav-brand{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--yellow);display:flex;align-items:center;gap:10px;}
.nav-back{display:flex;align-items:center;gap:6px;color:#fff;background:rgba(255,255,255,.15);padding:8px 16px;border-radius:99px;font-size:13px;font-weight:800;cursor:pointer;transition:.2s;text-decoration:none;}
.nav-back:hover{background:rgba(255,255,255,.25);transform:translateX(-3px);}
.nav-timer{background:var(--dark);border:2px solid var(--yellow);border-radius:99px;padding:6px 20px;font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--yellow);letter-spacing:.05em;}

/* PROGRESS BAR */
.progress-bar-top{height:4px;background:rgba(255,255,255,.15);position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--pink));transition:width .4s ease;}

/* MAIN */
.main{max-width:760px;margin:0 auto;padding:32px 24px 80px;}

/* QUESTION CARD */
.q-card{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:32px 28px;box-shadow:5px 5px 0 var(--dark);animation:fadeUp .4s ease both;margin-bottom:24px;}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.q-num{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--purple);line-height:1;}
.q-enunciado{font-size:16px;font-weight:600;color:var(--dark);line-height:1.75;white-space:pre-wrap;margin-bottom:24px;}

/* ALTERNATIVES */
.alts{display:flex;flex-direction:column;gap:10px;}
.alt-btn{
  display:flex;align-items:flex-start;gap:14px;
  background:#F8F0FF;border:2px solid #DDD6FE;
  border-radius:14px;padding:14px 18px;
  cursor:pointer;text-align:left;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--dark);
  transition:.2s;width:100%;
}
.alt-btn:hover{border-color:var(--purple);background:#EDE9FE;transform:translateX(4px);}
.alt-btn.selected{border-color:var(--purple);background:#EDE9FE;box-shadow:3px 3px 0 var(--purple);}
.alt-btn.correct{border-color:var(--green);background:#DCFCE7;color:var(--green);}
.alt-btn.wrong{border-color:var(--red);background:#FEE2E2;color:var(--red);}
.alt-letter{width:26px;height:26px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;}

/* EXPLICACAO */
.explicacao-box{background:#F0FDF4;border:2px solid #86EFAC;border-radius:14px;padding:18px 20px;margin-top:16px;font-size:14px;font-weight:600;color:#15803D;line-height:1.7;display:none;white-space:pre-wrap;}
.explicacao-box.show{display:block;}

/* NAV BUTTONS */
.q-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.btn-nav{font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;padding:13px 26px;border-radius:99px;border:3px solid var(--dark);cursor:pointer;transition:.2s;box-shadow:4px 4px 0 var(--dark);}
.btn-next{background:var(--purple);color:#fff;}
.btn-finish{background:var(--yellow);color:var(--dark);}

/* Q MAP */
.q-map{background:#fff;border:2px solid #DDD6FE;border-radius:16px;padding:16px;margin-bottom:24px;}
.q-map-dots{display:flex;flex-wrap:wrap;gap:8px;}
.q-dot{width:34px;height:34px;border-radius:50%;border:2px solid #DDD6FE;background:#fff;color:var(--dark);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
.q-dot.current{border:2px solid var(--dark);box-shadow:2px 2px 0 var(--dark);}
.q-dot.answered{background:var(--purple);color:#fff;border-color:var(--purple);}

/* Breadcrumb & Header */
.sim-header{margin-bottom:24px;}
.sim-breadcrumb{font-size:13px;font-weight:700;color:#888;margin-bottom:8px;}
.sim-breadcrumb a{color:var(--purple);text-decoration:none;}
.sim-h1{font-family:'Black Han Sans',sans-serif;font-size:32px;color:var(--dark);margin-bottom:12px;}
.sim-meta{display:flex;gap:12px;flex-wrap:wrap;}
.sim-meta span{font-size:13px;font-weight:800;color:#555;background:#F3E8FF;border:2px solid #DDD6FE;border-radius:99px;padding:6px 16px;}

/* RESULTADO */
.result-screen{display:none;text-align:center;}
.result-score-box{background:var(--purple);border:4px solid var(--dark);border-radius:24px;padding:36px;max-width:420px;margin:24px auto;box-shadow:8px 8px 0 var(--dark);color:#fff;}
.result-pct{font-family:'Black Han Sans',sans-serif;font-size:72px;color:var(--yellow);line-height:1;}

/* TELA DE INÍCIO */
.start-screen{text-align:center;padding:40px 20px;}
.btn-start-sim{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:18px;font-weight:900;padding:16px 40px;border-radius:99px;border:3px solid var(--dark);cursor:pointer;box-shadow:5px 5px 0 var(--dark);transition:.2s;}
</style>
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:15px">
    <a href="dashboard.html" class="nav-back">← Sair</a>
    <div class="nav-brand">📝 ENEM na Prática</div>
  </div>
  <div class="nav-timer" id="timerDisplay">00:00</div>
</nav>

<div class="progress-bar-top"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="main">
  <div id="startScreen" class="start-screen">
    <h1 id="startTitle" style="font-family:'Black Han Sans',sans-serif;font-size:36px;margin-bottom:12px;">Carregando...</h1>
    <div id="startInfo" style="display:flex;gap:10px;justify-content:center;margin-bottom:24px;"></div>
    <button class="btn-start-sim" onclick="iniciarSimulado()">🚀 Iniciar Simulado Agora</button>
  </div>

  <div id="simScreen" style="display:none">
    <div class="sim-header" id="simHeader"></div>
    <div class="q-map" id="qMap"></div>
    <div id="questionArea"></div>
    <div class="q-nav" id="qNav"></div>
  </div>

  <div id="resultScreen" class="result-screen"></div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var simId = parseInt(params.get('id')) || 1;
var sim = (window.SIMULADOS || []).find(function(s){ return s.id === simId; });

if(!sim){
  sim = { id:simId, title:"Simulado " + simId, qs:5, time:"45min", matLabel:"ENEM", questoes:[] };
}

var questoes = sim.questoes;
var currentQ = 0;
var respostas = {};
var timerInterval = null;
var elapsed = 0;

document.getElementById('startTitle').textContent = sim.title;
document.getElementById('startInfo').innerHTML = '<span>⏱ '+sim.time+'</span> <span>📋 '+questoes.length+' questões</span>';

function iniciarSimulado(){
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('simScreen').style.display = 'block';
  startTimer();
  renderHeader();
  renderMap();
  renderQuestion();
}

function startTimer(){
  timerInterval = setInterval(function(){
    elapsed++;
    var m = Math.floor(elapsed/60), s = elapsed%60;
    document.getElementById('timerDisplay').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }, 1000);
}

function renderHeader(){
  var meta = '<span>⏱ ' + sim.time + '</span> <span>📋 ' + questoes.length + ' questões</span>';
  if(sim.mat !== 'provao') meta = '<span>' + sim.matLabel + '</span>' + meta;
  
  document.getElementById('simHeader').innerHTML =
    '<div class="sim-breadcrumb"><a href="dashboard.html">Dashboard</a> › Simulados › ' + sim.title + '</div>' +
    '<h1 class="sim-h1">' + sim.title + '</h1>' +
    '<div class="sim-meta">' + meta + '</div>';
}

function renderMap(){
  var dots = questoes.map(function(q,i){
    var cls = 'q-dot' + (i === currentQ ? ' current' : '') + (respostas[i] !== undefined ? ' answered' : '');
    return '<div class="'+cls+'" onclick="goTo('+i+')">'+(i+1)+'</div>';
  }).join('');
  document.getElementById('qMap').innerHTML = '<div class="q-map-dots">'+dots+'</div>';
}

function goTo(i){ currentQ = i; renderMap(); renderQuestion(); }

function renderQuestion(){
  var q = questoes[currentQ], answered = respostas[currentQ] !== undefined;
  var alts = (q.alternativas || []).map(function(alt,i){
    var letter = ['A','B','C','D','E'][i], cls = 'alt-btn' + (answered ? (letter === q.gabarito ? ' correct' : (respostas[currentQ] === letter ? ' wrong' : '')) : '');
    return '<button class="'+cls+'" onclick="responder(\''+letter+'\')" '+(answered?'disabled':'')+'><div class="alt-letter">'+letter+'</div><span>'+alt+'</span></button>';
  }).join('');
  
  document.getElementById('questionArea').innerHTML = '<div class="q-card"><h3>Questão '+(currentQ+1)+'</h3><div class="q-enunciado">'+q.enunciado+'</div><div class="alts">'+alts+'</div>'+(answered?'<div class="explicacao-box show"><b>✅ Explicação:</b> '+q.explicacao+'</div>':'')+'</div>';
  renderNav();
}

function responder(letter){
  if(respostas[currentQ] !== undefined) return;
  respostas[currentQ] = letter;
  renderMap(); renderQuestion();
}

function nextQ(){ if(currentQ < questoes.length-1) goTo(currentQ+1); }
function prevQ(){ if(currentQ > 0) goTo(currentQ-1); }

function renderNav(){
  var isLast = currentQ === questoes.length-1, allAns = Object.keys(respostas).length === questoes.length;
  document.getElementById('qNav').innerHTML = '<button class="btn-nav" onclick="prevQ()">← Anterior</button>' + (isLast && allAns ? '<button class="btn-nav btn-finish" onclick="finalizar()">Finalizar</button>' : '<button class="btn-nav btn-next" onclick="nextQ()">Próxima →</button>');
}

function finalizar(){
  clearInterval(timerInterval);
  var corretas = questoes.filter((q,i)=>respostas[i]===q.gabarito).length;
  var score = Math.round(corretas/questoes.length*1000);
  
  var essayHtml = '';
  if(sim.mat === 'provao' && sim.essayPrompt) {
    essayHtml = '<div style="background:linear-gradient(135deg, #7B2FBE, #FF2D8B);color:#fff;padding:25px;border-radius:20px;margin-top:20px;text-align:center;">' +
      '<h2 style="font-family:\'Black Han Sans\',sans-serif;margin-bottom:10px;color:var(--yellow);">🚀 Fase 2: Redação do Provão</h2>' +
      '<p style="font-size:14px;margin-bottom:15px;font-weight:600;">Tema Sugerido: "'+sim.essayPrompt+'"</p>' +
      '<button class="btn-start-sim" onclick="irParaRedacao()" style="background:var(--yellow);color:var(--dark);padding:12px 24px;">✍️ Escrever Redação Agora</button>' +
      '</div>';
  }

  document.getElementById('simScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  document.getElementById('resultScreen').innerHTML = 
    '<div class="result-score-box"><div class="result-pct">'+score+'</div><p>Sua Nota TRI Estimada</p></div>' +
    essayHtml +
    '<button class="btn-start-sim" onclick="location.href=\'dashboard.html\'" style="margin-top:20px;background:#fff;color:var(--dark);">Voltar ao Painel</button>';
}

function irParaRedacao(){
  localStorage.setItem('red_tema_persistido', sim.essayPrompt);
  window.location.href = 'dashboard.html?tab=red';
}
</script>
</body>
</html>
