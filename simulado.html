<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Simulado Elite | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;}

:root{
  --purple:#7B2FBE; --purple-dark:#5B21B6;
  --yellow:#FFD600; --dark:#1a1a2e;
}

/* NAVBAR ELITE */
.navbar{
  background:var(--purple); padding:0 24px; height:64px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100; border-bottom:3px solid var(--dark);
  box-shadow:0 4px 20px rgba(123,47,190,.3);
}
.nav-back{ color:white; text-decoration:none; font-weight:800; font-size:14px; }
.nav-timer{ font-family:'Black Han Sans',sans-serif; font-size:24px; color:var(--yellow); text-shadow:2px 2px 0 var(--dark); }

/* CONTAINER */
.container{ max-width:850px; margin:40px auto; padding:0 20px; }

/* QUESTÃO CARD */
.q-card{
  background:white; border:3px solid var(--dark); border-radius:20px;
  padding:40px; box-shadow:8px 8px 0 var(--dark); margin-bottom:30px;
}
.q-tag{
  background:var(--yellow); color:var(--dark); font-size:11px; font-weight:900;
  padding:6px 14px; border-radius:99px; border:2px solid var(--dark);
  display:inline-block; margin-bottom:15px; text-transform:uppercase;
}
.q-text{ font-size:18px; font-weight:700; line-height:1.6; margin-bottom:30px; }

/* OPÇÕES */
.options{ display:flex; flex-direction:column; gap:12px; }
.opt-btn{
  background:white; border:3px solid var(--dark); border-radius:14px;
  padding:15px 20px; text-align:left; cursor:pointer; font-family:inherit;
  display:flex; align-items:center; gap:15px; font-weight:800; transition:0.2s;
  box-shadow:4px 4px 0 var(--dark);
}
.opt-btn:hover{ transform:translate(-2px, -2px); box-shadow:6px 6px 0 var(--dark); background:#fcfcfc; }
.opt-btn.selected{ background:var(--yellow); transform:translate(2px, 2px); box-shadow:0 0 0 var(--dark); }

.opt-letter{
  width:32px; height:32px; border-radius:50%; border:2px solid var(--dark);
  display:flex; align-items:center; justify-content:center; font-family:'Black Han Sans',sans-serif;
  flex-shrink:0;
}

/* ÁREA DISCURSIVA / REDAÇÃO */
.discursive-box{ display:flex; flex-direction:column; gap:20px; }
.essay-input{
  width:100%; min-height:300px; padding:20px; border:3px solid var(--dark);
  border-radius:15px; font-family:inherit; font-size:16px; font-weight:600;
  outline:none; background:#fafafa;
}
.ai-btn{
  background:linear-gradient(135deg, var(--purple), #D946EF); color:white;
  border:3px solid var(--dark); padding:18px; border-radius:15px;
  font-family:'Black Han Sans',sans-serif; font-size:16px; cursor:pointer;
  box-shadow:4px 4px 0 var(--dark); transition:0.2s;
}
.ai-btn:hover{ transform:translate(-2px, -2px); box-shadow:6px 6px 0 var(--dark); }

/* NAVEGAÇÃO PROVA */
.nav-btns{ display:flex; justify-content:space-between; gap:15px; margin-top:30px; }
.btn-elite{
  background:white; color:var(--dark); border:3px solid var(--dark);
  padding:15px 30px; border-radius:99px; font-family:'Black Han Sans',sans-serif;
  font-size:16px; cursor:pointer; box-shadow:4px 4px 0 var(--dark); transition:0.2s;
}
.btn-elite.primary{ background:var(--yellow); }
.btn-elite:hover{ transform:translate(-2px, -2px); box-shadow:6px 6px 0 var(--dark); }

/* MODAL IA */
.modal{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(5px); z-index:1000; align-items:center; justify-content:center; padding:20px; }
.modal-box{ background:white; border:4px solid var(--dark); border-radius:24px; padding:40px; max-width:650px; width:100%; box-shadow:12px 12px 0 var(--dark); }
.modal-header{ font-family:'Black Han Sans',sans-serif; font-size:24px; color:var(--purple); margin-bottom:20px; }

#startScreen{ text-align:center; padding:100px 0; }
#startScreen h1{ font-family:'Black Han Sans',sans-serif; font-size:48px; color:var(--purple); margin-bottom:20px; }
</style>
</head>
<body>

<nav class="navbar">
  <a href="dashboard.html" class="nav-back">← SAIR DO SIMULADO</a>
  <div class="nav-timer" id="timer">00:00</div>
</nav>

<div class="container">
  <div id="startScreen">
    <h1 id="simTitle">Carregando...</h1>
    <p id="simInfo" style="font-weight:700; color:#666; margin-bottom:40px;"></p>
    <button class="btn-elite primary" onclick="startSim()">🚀 INICIAR PROVA AGORA</button>
  </div>

  <div id="simScreen" style="display:none">
    <div id="qArea"></div>
    <div class="nav-btns">
      <button class="btn-elite" onclick="prev()">← ANTERIOR</button>
      <button class="btn-elite primary" id="nextBtn" onclick="next()">PRÓXIMO QUESTÃO →</button>
    </div>
  </div>
</div>

<!-- MODAL PROFESSOR ALBERTO -->
<div class="modal" id="aiModal">
  <div class="modal-box">
    <div class="modal-header">👨‍🏫 Professor Alberto (IA)</div>
    <div id="aiResponse" style="line-height:1.7; margin-bottom:25px; font-weight:700; color:#444; font-size:15px;">Analisando sua resposta com critério ENEM...</div>
    <button class="btn-elite primary" style="width:100%;" onclick="closeAI()">ENTENDIDO, PROFESSOR!</button>
  </div>
</div>

<script src="simulados-data.js"></script>
<script src="src/js/simulados-extra.js"></script>
<script src="src/js/simulados-extra2.js"></script>
<script src="src/js/provao-data.js"></script>

<script>
let sim = null;
let currentQ = 0;
let answers = {};
let time = 0;
let timer = null;

function load(){
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  let all = [];
  if(typeof SIMULADOS !== 'undefined') all = SIMULADOS;
  else if(window.SIMULADOS) all = window.SIMULADOS;

  sim = all.find(s => s.id === id);
  if(!sim) return;

  document.getElementById('simTitle').textContent = sim.title;
  document.getElementById('simInfo').textContent = `${sim.qs} questões · ${sim.matLabel || 'Simulado'}`;
}

function startSim(){
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('simScreen').style.display = 'block';
  render();
  timer = setInterval(() => {
    time++;
    const m = Math.floor(time/60);
    const s = time%60;
    document.getElementById('timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function render(){
  const q = sim.questoes[currentQ];
  const area = document.getElementById('qArea');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = currentQ === sim.questoes.length - 1 ? 'FINALIZAR SIMULADO' : 'PRÓXIMO QUESTÃO →';

  let html = `
    <div class="q-card">
      <div class="q-tag">Questão ${currentQ + 1} de ${sim.questoes.length}</div>
      <div class="q-text">${q.enunciado}</div>`;

  if(q.alternativas){
    html += `<div class="options">` + q.alternativas.map((opt, i) => {
      const letter = ['A','B','C','D','E'][i];
      return `<button class="opt-btn ${answers[currentQ] === letter ? 'selected' : ''}" onclick="ans('${letter}')">
        <div class="opt-letter">${letter}</div>
        <div>${opt}</div>
      </button>`;
    }).join('') + `</div>`;
  } else {
    html += `
      <div class="discursive-box">
        <textarea class="essay-input" id="discInp" placeholder="Escreva sua redação ou resposta aqui..." oninput="saveDisc(this.value)">${answers[currentQ] || ''}</textarea>
        <button class="ai-btn" onclick="corrigirIA()">
          🤖 SOLICITAR CORREÇÃO PROF. ALBERTO (IA)
        </button>
      </div>`;
  }
  html += `</div>`;
  area.innerHTML = html;
}

function ans(l){ answers[currentQ] = l; render(); }
function saveDisc(v){ answers[currentQ] = v; }
function prev(){ if(currentQ > 0){ currentQ--; render(); } }
function next(){
  if(currentQ < sim.questoes.length - 1){ currentQ++; render(); }
  else { alert('Simulado Finalizado com Sucesso!'); window.location.href='dashboard.html'; }
}

async function corrigirIA(){
  const text = document.getElementById('discInp').value;
  if(text.length < 50){ alert('Escreva pelo menos 50 caracteres para uma análise útil.'); return; }
  document.getElementById('aiModal').style.display = 'flex';
  document.getElementById('aiResponse').textContent = 'O Professor Alberto está lendo seu texto...';
  try {
    const resp = await fetch('/api/ai-correction', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ enunciado: sim.questoes[currentQ].enunciado, resposta: text, materia: sim.matLabel })
    });
    const data = await resp.json();
    document.getElementById('aiResponse').innerHTML = data.correction.replace(/\n/g, '<br>');
  } catch(e) {
    document.getElementById('aiResponse').innerHTML = "<b>Erro de conexão.</b> O Professor Alberto está offline no momento, mas os ajustes visuais estão ativos!";
  }
}

function closeAI(){ document.getElementById('aiModal').style.display = 'none'; }
window.onload = load;
</script>
</body>
</html>
