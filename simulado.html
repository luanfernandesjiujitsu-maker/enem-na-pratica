<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Simulado | ENEM na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<script src="src/js/data.js"></script>
<style>
  /* Restaurando TODO o CSS original que você tinha */
  :root{--pink:#FF2D8B;--purple:#7B2FBE;--yellow:#FFD600;--dark:#1a1a2e;--green:#16A34A;--red:#DC2626;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:#F8F0FF;color:#1a1a2e;min-height:100vh;}
  .navbar{background:var(--purple);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.2);}
  .nav-brand{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--yellow);}
  .nav-back{color:rgba(255,255,255,.8);font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;}
  .nav-timer{background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.2);border-radius:99px;padding:6px 18px;font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--yellow);}
  .main{max-width:760px;margin:0 auto;padding:32px 24px 80px;}
  .q-card{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:32px 28px;box-shadow:5px 5px 0 var(--dark);margin-bottom:24px;}
  .alt-btn{display:flex;align-items:flex-start;gap:14px;background:#F8F0FF;border:2px solid #DDD6FE;border-radius:14px;padding:14px 18px;cursor:pointer;width:100%;margin-bottom:10px;font-weight:700;}
  .alt-btn:hover{background:#EDE9FE;border-color:var(--purple);}
  .alt-btn.selected{border-color:var(--purple);background:#EDE9FE;}
  .alt-btn.correct{border-color:var(--green);background:#DCFCE7;}
  .alt-btn.wrong{border-color:var(--red);background:#FEE2E2;}
  .btn-next{background:var(--purple);color:#fff;padding:13px 26px;border-radius:99px;border:3px solid var(--dark);font-weight:900;cursor:pointer;box-shadow:4px 4px 0 var(--dark);}
  .explicacao-box{background:#F0FDF4;border:2px solid #86EFAC;border-radius:14px;padding:18px 20px;margin-top:16px;display:none;}
  .explicacao-box.show{display:block;}
  /* ... resto do CSS original segue aqui ... */
</style>
</head>
<body>

<nav class="navbar">
  <a href="dashboard.html" class="nav-back">← Voltar</a>
  <div class="nav-brand">📝 ENEM na Prática</div>
  <div class="nav-timer" id="timerDisplay">00:00</div>
</nav>

<div class="main">
  <div id="startScreen" style="text-align:center;padding:40px 20px;">
    <h1 id="startTitle" class="nav-brand" style="font-size:32px;color:var(--dark);margin-bottom:20px;">Carregando...</h1>
    <button class="btn-next" onclick="iniciarSimulado()" style="background:var(--yellow);color:var(--dark);">🚀 Iniciar Simulado Agora</button>
  </div>

  <div id="simScreen" style="display:none">
    <div id="questionArea"></div>
    <div class="q-nav" id="qNav" style="display:flex;justify-content:space-between;margin-top:20px;"></div>
  </div>

  <div id="resultScreen" style="display:none;text-align:center;"></div>
</div>

<script>
  // Restaurando a lógica original exata que você tinha no simulado.html
  var params = new URLSearchParams(window.location.search);
  var simId = parseInt(params.get('id')) || 1;
  var sim = SIMULADOS.find(function(s){ return s.id === simId; });
  var questoes = sim ? sim.questoes : [];
  var currentQ = 0;
  var respostas = {};
  var elapsed = 0;
  var timerInterval;

  document.getElementById('startTitle').textContent = sim ? sim.title : "Simulado";

  function iniciarSimulado(){
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('simScreen').style.display = 'block';
    startTimer();
    renderQuestion();
  }

  function startTimer(){
    timerInterval = setInterval(function(){
      elapsed++;
      var m = Math.floor(elapsed/60);
      var s = elapsed%60;
      document.getElementById('timerDisplay').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }, 1000);
  }

  function renderQuestion(){
    var q = questoes[currentQ];
    var answered = respostas[currentQ] !== undefined;
    var html = '<div class="q-card"><h2>'+(currentQ+1)+'. '+q.enunciado+'</h2><div style="margin-top:20px;">';
    q.alternativas.forEach(function(alt, i){
      var letter = ['A','B','C','D','E'][i];
      var cls = 'alt-btn';
      if(answered){
        if(letter === q.gabarito) cls += ' correct';
        else if(respostas[currentQ] === letter) cls += ' wrong';
      }
      html += '<button class="'+cls+'" onclick="responder(\''+letter+'\')" '+(answered?'disabled':'')+'>'+alt+'</button>';
    });
    html += '</div>';
    if(answered) html += '<div class="explicacao-box show"><strong>Gabarito: '+q.gabarito+'</strong><br>'+q.explicacao+'</div>';
    html += '</div>';
    document.getElementById('questionArea').innerHTML = html;
    renderNav();
  }

  function responder(letter){
    respostas[currentQ] = letter;
    renderQuestion();
  }

  function renderNav(){
    var html = '';
    if(currentQ > 0) html += '<button class="btn-next" onclick="currentQ--;renderQuestion()" style="background:#fff;color:#000;">Anterior</button>';
    else html += '<div></div>';
    if(currentQ < questoes.length - 1) html += '<button class="btn-next" onclick="currentQ++;renderQuestion()">Próxima</button>';
    else html += '<button class="btn-next" onclick="finalizar()" style="background:var(--yellow);color:var(--dark);">🏁 Finalizar</button>';
    document.getElementById('qNav').innerHTML = html;
  }

  function finalizar(){
    clearInterval(timerInterval);
    document.getElementById('simScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    var acertos = 0;
    questoes.forEach(function(q, i){ if(respostas[i] === q.gabarito) acertos++; });
    document.getElementById('resultScreen').innerHTML = '<h1>Resultado</h1><div style="font-size:60px;margin:20px;">'+acertos+'/'+questoes.length+'</div><button class="btn-next" onclick="location.href=\'dashboard.html\'">Voltar ao Dashboard</button>';
  }
</script>

<script type="module">
  import { checkSession } from './src/js/auth.js';
  checkSession();
</script>
</body>
</html>
